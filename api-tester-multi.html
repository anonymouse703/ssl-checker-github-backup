<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SSL Checker — Multi Domain Results</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 14px; background: #f3f3f3; color: #222;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        font-size: 13px;
      }
      .page-title { font-size: 16px; font-weight: bold; margin: 0 0 10px 0; }
      .panel {
        background: #fff; border: 1px solid #d8d8d8; border-radius: 10px;
        padding: 14px 18px; margin-bottom: 12px;
      }
      .scan-row { line-height: 28px; }
      .muted { color: #666; font-size: 12px; }
      .pill {
        display: inline-block; padding: 3px 12px; background: #e8f0fa;
        color: #185fa5; border-radius: 14px; font-weight: bold;
        margin-left: 8px; margin-right: 8px; font-family: monospace; font-size: 12px;
      }
      .server-pill {
        display: inline-block; padding: 3px 12px; background: #f0faf4;
        color: #1f8b3a; border-radius: 14px; font-weight: bold;
        margin-left: 8px; margin-right: 4px;
      }
      .status-pill {
        display: inline-block; padding: 3px 12px; border-radius: 14px;
        font-size: 12px; font-weight: bold; background: #185fa5; color: #fff;
      }
      .status-pill.done { background: #28a745; }
      .section-title { font-size: 14px; font-weight: bold; margin: 0 0 10px 0; }
      .status-text { margin-bottom: 6px; color: #4b4b4b; }
      .progress-wrap { margin-top: 2px; }
      .progress-bar { width: 100%; height: 9px; background: #dedede; border-radius: 20px; overflow: hidden; }
      .progress-fill { width: 0%; height: 9px; background: #1f78d1; transition: width 0.3s; }
      .progress-fill.done { background: #1f8b3a; }
      .progress-pct { text-align: right; color: #777; font-size: 11px; margin-top: 4px; }

      .log-container { margin-top: 12px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; background: #1e1e1e; }
      .log-header {
        background: #2d2d2d; padding: 7px 12px; border-bottom: 1px solid #3d3d3d;
        font-size: 12px; font-weight: 600; color: #e0e0e0;
        display: flex; justify-content: space-between; align-items: center;
      }
      .log-controls { display: flex; gap: 6px; }
      .log-controls button {
        height: 24px; padding: 0 10px; font-size: 10px;
        background: #3d3d3d; border: 1px solid #555;
        border-radius: 4px; cursor: pointer; color: #e0e0e0;
      }
      .log-controls button:hover { background: #4d4d4d; }
      .console-box {
        background: #1e1e1e; color: #d4d4d4; padding: 12px;
        min-height: 200px; max-height: 380px; overflow: auto;
        white-space: pre-wrap; word-wrap: break-word;
        font-family: Consolas, 'Courier New', monospace; font-size: 11px; line-height: 1.45;
      }

      .done-banner {
        display: none; background: #d4edda; border: 1px solid #c3e6cb;
        color: #155724; border-radius: 8px; padding: 10px 14px;
        margin-bottom: 12px; font-weight: bold;
      }

      .results-panel { display: none; }

      .summary-stats { display: flex; gap: 10px; flex-wrap: wrap; }
      .stat-box {
        background: #f8f9fc; padding: 10px 14px; border-radius: 10px;
        text-align: center; flex: 1; min-width: 90px; border: 1px solid #e5e5e5;
      }
      .stat-number { font-size: 22px; font-weight: bold; color: #185fa5; }
      .stat-label { font-size: 11px; color: #777; margin-top: 2px; }

      .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 14px; margin-top: 12px; }
      .domain-card {
        background: #fff; border: 1px solid #e5e5e5;
        border-radius: 12px; overflow: hidden;
      }
      .card-header {
        background: #f8f9fc; padding: 10px 14px; border-bottom: 1px solid #e5e5e5;
        display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;
      }
      .card-domain { font-size: 13px; font-weight: 700; color: #185fa5; word-break: break-all; }
      .card-badge { padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
      .badge-success { background: #28a745; color: white; }
      .badge-warning { background: #ffc107; color: #333; }
      .badge-danger { background: #dc3545; color: white; }
      .card-body { padding: 10px 14px; }
      .metric-row {
        display: flex; justify-content: space-between;
        padding: 5px 0; border-bottom: 1px solid #f0f0f0;
      }
      .metric-row:last-child { border-bottom: none; }
      .metric-label { color: #777; font-size: 11px; }
      .metric-value { font-weight: 600; font-size: 11px; color: #333; }
      .metric-value.good { color: #28a745; }
      .metric-value.warning { color: #e0a000; }
      .metric-value.bad { color: #dc3545; }

      .card-tabs {
        display: flex; flex-wrap: wrap; gap: 4px;
        padding: 8px 14px 0 14px; border-top: 1px solid #f0f0f0;
      }
      .card-tab-btn {
        height: 24px; padding: 0 9px; border: 1px solid #ccc;
        border-radius: 5px; background: #f7f7f7; cursor: pointer;
        font-size: 10px; transition: all 0.15s;
      }
      .card-tab-btn:hover { background: #eee; }
      .card-tab-btn.active { background: #185fa5; color: #fff; border-color: #185fa5; }
      .card-tab-panel { display: none; padding: 8px 14px 12px; }
      .card-tab-panel.active { display: block; }
      .card-tab-panel img {
        display: block; width: 100%; height: auto;
        border: 1px solid #ddd; border-radius: 6px; background: #fff;
      }
      .card-tab-panel a { display: block; }
      .card-footer {
        background: #fafbfc; padding: 7px 14px;
        border-top: 1px solid #e5e5e5; font-size: 10px; color: #888; text-align: right;
      }
      .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
  </head>
  <body>
    <div class="page-title">SSL Checker — Multi Domain Results</div>

    <div class="panel" style="padding:10px 18px; margin-bottom:12px;">
      <div class="scan-row">
        <span class="muted">Server:</span>
        <span class="server-pill" id="serverNameTag">—</span>
        <span class="muted" id="serverUrlTag" style="font-size:11px;"></span>
      </div>
    </div>

    <div class="panel">
      <div class="scan-row">
        <span class="muted">Batch:</span>
        <span class="pill" id="batchTag"></span>
        <span class="status-pill" id="scanStatusBadge">Starting...</span>
      </div>
    </div>

    <div class="panel" id="progressPanel">
      <div class="section-title">Live progress</div>
      <div class="status-text" id="statusText">Waiting...</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-pct" id="pctText">0%</div>
      </div>

      <div class="log-container">
        <div class="log-header">
          <span>📋 Console log</span>
          <div class="log-controls">
            <button onclick="clearLog()">Clear</button>
            <button onclick="copyLog(event)">Copy</button>
            <button onclick="toggleAutoScroll(event)">Auto-scroll: ON</button>
          </div>
        </div>
        <div class="console-box" id="logBox">(waiting for output...)</div>
      </div>
    </div>

    <div class="done-banner" id="doneNotice">
      <span>&#10004;</span> Batch complete! Results loaded below.
    </div>

    <div class="panel results-panel" id="summaryCard">
      <div class="section-title">📈 Batch Summary</div>
      <div class="summary-stats" id="summaryStats"></div>
    </div>

    <div class="panel results-panel" id="resultCard">
      <div class="section-title">📋 Domain Results</div>
      <div id="resultsGrid" class="results-grid"></div>
    </div>

    <script>
      (function() {
        var AUTO_BATCH_ID = new URLSearchParams(window.location.search).get("batch_id") || "";
        var API_BASE = window.location.protocol + "//" + window.location.host;
        var pollTimer = null;
        var autoScroll = true;
        var batchIsDone = false;
        var resultRendered = false;

        function byId(id) { return document.getElementById(id); }

        function getParam(name) {
          var qs = window.location.search.substring(1);
          var parts = qs.split("&");
          for (var i = 0; i < parts.length; i++) {
            var pair = parts[i].split("=");
            if (decodeURIComponent(pair[0]) === name) return decodeURIComponent((pair[1]||"").replace(/\+/g," "));
          }
          return "";
        }

        function escapeHtml(str) {
          if (str == null) return "";
          return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }

        function setText(id, val) { byId(id).innerHTML = escapeHtml(val); }

        function clearLog() { byId("logBox").textContent = "(log cleared)"; }

        function copyLog(ev) {
          navigator.clipboard.writeText(byId("logBox").textContent).then(function() {
            var btn = ev.target;
            var orig = btn.textContent;
            btn.textContent = "Copied!";
            setTimeout(function(){ btn.textContent = orig; }, 1500);
          });
        }

        function toggleAutoScroll(ev) {
          autoScroll = !autoScroll;
          ev.target.textContent = autoScroll ? "Auto-scroll: ON" : "Auto-scroll: OFF";
        }

        function getServerName() {
          var p = getParam("server_name");
          return p ? String(p).trim().replace(/%20/g," ") : "";
        }

        function setBadgeState(text, done) {
          var badge = byId("scanStatusBadge");
          badge.innerHTML = escapeHtml(text);
          if (done) badge.classList.add("done");
          else badge.classList.remove("done");
        }

        function markBatchCompleteState() {
          batchIsDone = true;
          setBadgeState("Done", true);
          byId("progressFill").style.width = "100%";
          byId("progressFill").className = "progress-fill done";
          setText("pctText", "100%");
          setText("statusText", "Batch complete!");
          byId("doneNotice").style.display = "block";
        }

        function xhrGetJson(url, okFn, errFn) {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", url, true);
          xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
              if (xhr.status >= 200 && xhr.status < 300) {
                try { okFn(JSON.parse(xhr.responseText)); } catch(e) { if (errFn) errFn(e); }
              } else {
                if (errFn) errFn(xhr.status);
              }
            }
          };
          xhr.send(null);
        }

        function xhrGetText(url, okFn, errFn) {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", url, true);
          xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
              if (xhr.status >= 200 && xhr.status < 300) okFn(xhr.responseText);
              else if (errFn) errFn(xhr.status);
            }
          };
          xhr.send(null);
        }

        window.switchCardTab = function(cardId, key, btn) {
          var card = document.getElementById(cardId);
          if (!card) return;
          card.querySelectorAll(".card-tab-btn").forEach(function(b){ b.classList.remove("active"); });
          card.querySelectorAll(".card-tab-panel").forEach(function(p){ p.classList.remove("active"); });
          btn.classList.add("active");
          var panel = document.getElementById(cardId + "_panel_" + key);
          if (panel) panel.classList.add("active");
        };

        function renderScreenshotTabs(row, cardId) {
          var tools = [
            { key:"ssl",       label:"SSL Lab",   url:row.SSL_Screenshot },
            { key:"sucuri",    label:"Sucuri",    url:row.Sucuri_Screenshot },
            { key:"pagespeed", label:"PageSpeed", url:row.PageSpeed_Screenshot },
            { key:"pingdom",   label:"Pingdom",   url:row.Pingdom_Screenshot },
            { key:"dns",       label:"DNS",       url:row.DNS_Screenshot },
            { key:"pagerank",  label:"PageRank",  url:row.PageRank_Screenshot },
            { key:"server",    label:"Server",    url:row.Server_Screenshot },
            { key:"intodns",   label:"IntoDNS",   url:row.IntoDNS_Screenshot }
          ].filter(function(t){ return t.url && t.url !== "none" && t.url !== ""; });

          if (!tools.length) return "";

          var tabs = tools.map(function(t, i) {
            return '<button type="button" class="card-tab-btn' + (i===0 ? " active" : "") + '" onclick="switchCardTab(\'' + cardId + '\',\'' + t.key + '\',this)">' + t.label + '</button>';
          }).join("");

          var panels = tools.map(function(t, i) {
            return '<div id="' + cardId + '_panel_' + t.key + '" class="card-tab-panel' + (i===0 ? " active" : "") + '">' +
              '<a href="' + escapeHtml(t.url) + '" target="_blank">' +
              '<img src="' + escapeHtml(t.url) + '" alt="' + t.label + '" loading="lazy">' +
              '</a>' +
              '<div style="font-size:10px;color:#888;text-align:right;margin-top:4px">Click to open full size ↗</div>' +
              '</div>';
          }).join("");

          return '<div class="card-tabs">' + tabs + '</div>' + panels;
        }

        function renderResultsCards(rows) {
          var grid = byId("resultsGrid");
          if (!rows || !rows.length) {
            grid.innerHTML = '<div class="empty-state">No results available yet.</div>';
            return;
          }

          var html = "";
          for (var i = 0; i < rows.length; i++) {
            var row = rows[i];
            var domain = row.Domain || "Unknown";
            var cardId = "dcard_" + i;
            var sslGrade = row.SSL_Grade || "N/A";
            var sucuri = row.Sucuri_Overall || "N/A";
            var pagespeed = row.PageSpeed_Performance || "N/A";
            var pingdom = row.Pingdom_Grade || "N/A";
            var dnsProp = row.DNS_Propagation || "N/A";
            var totalTime = row.Total_Time || "N/A";
            var ipAddress = row.Server_IP_Address || "N/A";
            var runAt = row.Run_At || "";
            var sslUrl = row.SSL_URL || ("https://www.ssllabs.com/ssltest/analyze.html?d=" + domain);

            var sslBadgeClass = (sslGrade==="A+"||sslGrade==="A"||sslGrade==="A-") ? "badge-success" :
                               (sslGrade==="B"||sslGrade==="C") ? "badge-warning" : "badge-danger";
            var sucuriBadgeClass = sucuri === "CLEAN" ? "badge-success" : "badge-warning";
            var psNum = parseInt(pagespeed, 10);
            var psClass = isNaN(psNum) ? "" : (psNum >= 90 ? "good" : psNum >= 50 ? "warning" : "bad");

            html += '<div class="domain-card" id="' + cardId + '">';
            html += '<div class="card-header">';
            html += '<span class="card-domain">' + escapeHtml(domain) + '</span>';
            html += '<span class="card-badge ' + sslBadgeClass + '">SSL: ' + escapeHtml(sslGrade) + '</span>';
            html += '</div>';
            html += '<div class="card-body">';
            html += '<div class="metric-row"><span class="metric-label">🛡️ Sucuri</span><span class="metric-value"><span class="card-badge ' + sucuriBadgeClass + '">' + escapeHtml(sucuri) + '</span></span></div>';
            html += '<div class="metric-row"><span class="metric-label">📈 PageSpeed</span><span class="metric-value ' + psClass + '">' + escapeHtml(pagespeed) + '</span></div>';
            html += '<div class="metric-row"><span class="metric-label">📊 Pingdom</span><span class="metric-value">' + escapeHtml(pingdom) + '</span></div>';
            html += '<div class="metric-row"><span class="metric-label">🌐 DNS</span><span class="metric-value">' + escapeHtml(dnsProp) + '</span></div>';
            html += '<div class="metric-row"><span class="metric-label">🖥️ IP</span><span class="metric-value">' + escapeHtml(ipAddress) + '</span></div>';
            html += '<div class="metric-row"><span class="metric-label">⏱️ Time</span><span class="metric-value">' + escapeHtml(totalTime) + '</span></div>';
            html += '<div class="metric-row"><span class="metric-label">📅 Run At</span><span class="metric-value">' + escapeHtml(runAt) + '</span></div>';
            html += '</div>';
            html += renderScreenshotTabs(row, cardId);
            html += '<div class="card-footer"><a href="' + escapeHtml(sslUrl) + '" target="_blank">SSL Report →</a> | <a href="https://' + escapeHtml(domain) + '" target="_blank">Visit Site</a></div>';
            html += '</div>';
          }

          grid.innerHTML = html;
        }

        function renderSummaryStats(rows) {
          var total = rows.length;
          var completed = rows.filter(function(r){ return r.SSL_Grade && r.SSL_Grade!=="N/A" && r.SSL_Grade!=="ERROR"; }).length;
          var failed = total - completed;
          var psVals = rows.filter(function(r){ return r.PageSpeed_Performance && r.PageSpeed_Performance!=="N/A"; }).map(function(r){ return parseInt(r.PageSpeed_Performance, 10); }).filter(function(n){ return !isNaN(n); });
          var avgPs = psVals.length ? Math.round(psVals.reduce(function(a,b){ return a+b; }, 0) / psVals.length) : 0;
          var topGrade = rows.map(function(r){ return r.SSL_Grade || "N/A"; }).sort()[0] || "N/A";

          var html = '<div class="stat-box"><div class="stat-number">' + total + '</div><div class="stat-label">Total</div></div>';
          html += '<div class="stat-box"><div class="stat-number" style="color:#28a745;">' + completed + '</div><div class="stat-label">Success</div></div>';
          html += '<div class="stat-box"><div class="stat-number" style="color:#dc3545;">' + failed + '</div><div class="stat-label">Failed</div></div>';
          html += '<div class="stat-box"><div class="stat-number">' + avgPs + '</div><div class="stat-label">Avg PageSpeed</div></div>';
          html += '<div class="stat-box"><div class="stat-number">' + escapeHtml(topGrade) + '</div><div class="stat-label">Top SSL</div></div>';

          byId("summaryStats").innerHTML = html;
        }

        function renderBatchResult(rows) {
          resultRendered = true;
          if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
          renderResultsCards(rows);
          renderSummaryStats(rows);
          markBatchCompleteState();
          byId("progressPanel").style.display = "none";
          byId("summaryCard").style.display = "block";
          byId("resultCard").style.display = "block";
        }

        function fetchMultiResultIfAvailable(batchId, okFn, notReadyFn) {
          xhrGetJson(API_BASE + "/multi-result?batch_id=" + encodeURIComponent(batchId), function(j) {
            if (j && j.ok) {
              var rows = j.results || j.data || [];
              if (rows && rows.length) {
                renderBatchResult(rows);
                if (okFn) okFn(rows);
              } else {
                if (notReadyFn) notReadyFn();
              }
            } else {
              if (notReadyFn) notReadyFn();
            }
          }, function() {
            if (notReadyFn) notReadyFn();
          });
        }

        function pollStatus(batchId) {
          xhrGetJson(API_BASE + "/multi-progress?batch_id=" + encodeURIComponent(batchId), function(j) {
            var p = (j && j.progress) ? j.progress : {};
            var completed = parseInt(p.completed || "0", 10);
            var total = parseInt(p.total || "1", 10) || 1;
            var pct = Math.round((completed / total) * 100);
            var status = p.status || "";

            byId("progressFill").style.width = pct + "%";
            setText("pctText", pct + "%");
            setText("statusText", "Batch running — " + completed + " / " + total + " — " + status);

            if (!batchIsDone) setBadgeState("Running...", false);

            var isDone = status.toUpperCase().indexOf("DONE") === 0;
            if (isDone && !batchIsDone) {
              if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
              fetchMultiResultIfAvailable(batchId, function() {});
            }
          }, function() {
            fetchMultiResultIfAvailable(batchId, function() {}, function() {
              setText("statusText", "Cannot reach server...");
            });
          });

          xhrGetText(API_BASE + "/multi-log?batch_id=" + encodeURIComponent(batchId), function(text) {
            var lines = text.split("\n");
            if (lines.length > 50) lines = lines.slice(lines.length - 50);
            var logBox = byId("logBox");
            logBox.textContent = lines.join("\n") || "(waiting for output...)";
            if (autoScroll) logBox.scrollTop = logBox.scrollHeight;
          });
        }

        function startPolling(batchId) {
          if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
          batchIsDone = false;
          resultRendered = false;
          setText("batchTag", batchId);
          setBadgeState("Running...", false);
          setText("statusText", "Loading batch status...");
          byId("progressPanel").style.display = "block";
          byId("doneNotice").style.display = "none";
          byId("summaryCard").style.display = "none";
          byId("resultCard").style.display = "none";
          byId("progressFill").className = "progress-fill";
          byId("progressFill").style.width = "0%";
          setText("pctText", "0%");
          byId("logBox").textContent = "(waiting for output...)";

          pollStatus(batchId);
          pollTimer = setInterval(function(){ pollStatus(batchId); }, 5000);
        }

        function decideInitialView(batchId) {
          // ?view=result mode: skip all polling, just show stored result
          // Used by FileMaker web viewer formula when IsScan batch is complete
          var viewMode = getParam("view");
          if (viewMode === "result") {
            byId("progressPanel").style.display = "none";
            fetchMultiResultIfAvailable(batchId, function() {
              setBadgeState("Done", true);
            }, function() {
              byId("progressPanel").style.display = "block";
              setText("statusText", "No result found for this batch yet.");
              setBadgeState("No result", false);
            });
            return;
          }

          // Check multi-status first (more reliable than progress for done detection)
          xhrGetJson(API_BASE + "/multi-status?batch_id=" + encodeURIComponent(batchId), function(j) {
            var isRunning = j && j.running === true;

            if (isRunning) {
              // Batch actively running on server — live poll
              startPolling(batchId);
            } else {
              // Not running — try to show result immediately without flashing polling UI
              byId("progressPanel").style.display = "none";
              fetchMultiResultIfAvailable(batchId, function() {
                setBadgeState("Done", true);
              }, function() {
                // Result not ready yet — fall back to polling
                byId("progressPanel").style.display = "block";
                startPolling(batchId);
              });
            }
          }, function() {
            // /multi-status unreachable — try result directly
            byId("progressPanel").style.display = "none";
            fetchMultiResultIfAvailable(batchId, function() {
              setBadgeState("Done", true);
            }, function() {
              byId("progressPanel").style.display = "block";
              startPolling(batchId);
            });
          });
        }

        window.clearLog = clearLog;
        window.copyLog = copyLog;
        window.toggleAutoScroll = toggleAutoScroll;

        window.onload = function() {
          setText("serverNameTag", getServerName());
          setText("serverUrlTag", API_BASE);

          if (!AUTO_BATCH_ID) {
            setText("batchTag", "No batch ID");
            setText("statusText", "Missing ?batch_id= parameter");
            return;
          }

          setText("batchTag", AUTO_BATCH_ID);
          decideInitialView(AUTO_BATCH_ID);
        };
      })();
    </script>
  </body>
</html>
