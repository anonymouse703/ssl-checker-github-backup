<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>SSL Checker - Multi Domain Results</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 10px;
        background: #f3f3f3;
        color: #222;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
      }
      .page-title {
        font-size: 15px;
        font-weight: bold;
        margin: 0 0 8px 0;
      }
      .panel {
        background: #fff;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .muted { color: #666; font-size: 11px; }
      .pill {
        display: inline-block;
        padding: 2px 9px;
        background: #e8f0fa;
        color: #185fa5;
        border-radius: 14px;
        font-weight: bold;
        margin: 0 4px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 11px;
      }

      /* ── Server Tabs ── */
      .tabs-wrap {
        background: #fff;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        margin-bottom: 10px;
        overflow: hidden;
      }
      .tabs-bar {
        display: flex;
        flex-wrap: wrap;
        background: #f0f2f5;
        border-bottom: 2px solid #d0d5dd;
        padding: 0 8px;
        gap: 2px;
      }
      .tab-btn {
        padding: 7px 16px;
        border: none;
        border-bottom: 3px solid transparent;
        background: transparent;
        color: #667085;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        margin-bottom: -2px;
        transition: color 0.15s, border-color 0.15s;
      }
      .tab-btn.active {
        color: #185fa5;
        border-bottom-color: #185fa5;
        background: transparent;
      }
      .tab-btn .tab-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #aaa;
        margin-right: 5px;
        vertical-align: middle;
        position: relative;
        top: -1px;
      }
      .tab-btn .tab-dot.running { background: #1f78d1; animation: blink 1.2s infinite; }
      .tab-btn .tab-dot.done    { background: #28a745; animation: none; }
      .tab-btn .tab-dot.error   { background: #c5221f; animation: none; }
      .tab-btn .tab-dot.idle    { background: #aaa; animation: none; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

      .tab-pane { display: none; padding: 10px 12px 12px; }
      .tab-pane.active { display: block; }

      /* ── Server header inside pane ── */
      .srv-header {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }
      .server-pill {
        display: inline-block;
        padding: 2px 10px;
        background: #f0faf4;
        color: #1f8b3a;
        border-radius: 14px;
        font-weight: bold;
        font-size: 12px;
      }
      .status-pill {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 14px;
        font-size: 11px;
        font-weight: bold;
        background: #185fa5;
        color: #fff;
      }
      .status-pill.done  { background: #28a745; }
      .status-pill.warn  { background: #d98c00; }
      .status-pill.error { background: #c5221f; }

      /* ── Progress bar ── */
      .prog-wrap { margin: 6px 0 2px; }
      .progress-bar {
        width: 100%;
        height: 7px;
        background: #dedede;
        border-radius: 20px;
        overflow: hidden;
      }
      .progress-fill {
        height: 7px;
        width: 0%;
        background: #1f78d1;
        border-radius: 20px;
        transition: width 0.4s ease;
      }
      .progress-fill.done { background: #1f8b3a; }
      .pct-row {
        display: flex;
        justify-content: space-between;
        color: #777;
        font-size: 10px;
        margin-top: 3px;
      }

      /* ── Console ── */
      .log-header {
        font-size: 11px;
        font-weight: 700;
        color: #555;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 10px 0 4px;
      }
      .console-box {
        background: #1e1e1e;
        color: #f2f2f2;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 7px 10px;
        min-height: 250px;
        max-height: 300px;
        overflow: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: Consolas, "Courier New", monospace;
        font-size: 10px;
        line-height: 1.4;
      }
      .small-btn {
        height: 20px;
        padding: 0 8px;
        font-size: 10px;
        background: #f7f7f7;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
      }
      .small-btn:hover { background: #ececec; }

      /* ── Shared Results ── */
      .done-banner {
        display: none;
        background: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
        border-radius: 8px;
        padding: 7px 12px;
        margin-bottom: 8px;
        font-weight: bold;
        font-size: 12px;
      }
      .mini-summary { font-size: 0; margin-bottom: 6px; }
      .mini-box {
        display: inline-block;
        vertical-align: top;
        width: 18%;
        min-width: 72px;
        margin: 0 1% 5px 0;
        background: #f7f7f7;
        border: 1px solid #e0e0e0;
        border-radius: 7px;
        padding: 7px 8px;
        font-size: 12px;
        text-align: center;
      }
      .mini-number {
        font-size: 17px;
        line-height: 20px;
        font-weight: bold;
        color: #185fa5;
      }
      .mini-label { font-size: 10px; color: #777; }
      .section-title { font-size: 13px; font-weight: bold; margin: 0 0 7px 0; }
      table.result-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        font-size: 11px;
      }
      table.result-table th,
      table.result-table td {
        border-bottom: 1px solid #e7e7e7;
        padding: 5px 4px;
        text-align: left;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      table.result-table th { color: #555; background: #f8f8f8; font-weight: bold; }
      .domain-cell { color: #185fa5; font-weight: bold; }
      .srv-tag {
        display: inline-block;
        font-size: 9px;
        padding: 1px 5px;
        background: #f0faf4;
        color: #1f8b3a;
        border-radius: 8px;
        font-weight: bold;
        margin-left: 3px;
      }
      .good { color: #188038; font-weight: bold; }
      .warn { color: #d98c00; font-weight: bold; }
      .bad  { color: #c5221f; font-weight: bold; }
      .error-box {
        display: none;
        background: #fff4e5;
        border: 1px solid #ffd8a8;
        color: #7a4a00;
        border-radius: 8px;
        padding: 7px 10px;
        margin-bottom: 8px;
        font-size: 11px;
      }
      .no-batch {
        padding: 12px;
        color: #888;
        text-align: center;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="page-title">SSL Checker - Multi Domain Results</div>
    <div class="error-box" id="globalErr"></div>

    <!-- Server tabs panel -->
    <div class="tabs-wrap" id="serversWrap">
      <div class="tabs-bar" id="tabsBar"></div>
      <div id="tabPanes"></div>
    </div>

    <!-- Shared results -->
    <div class="done-banner"  id="doneBanner">All batches complete. Results loaded.</div>
    <div class="panel" id="summaryPanel" style="display:none;">
      <div class="section-title">Batch Summary</div>
      <div class="mini-summary" id="summaryStats"></div>
    </div>
    <div class="panel" id="resultPanel" style="display:none;">
      <div class="section-title">Domain Results</div>
      <div id="resultsBox"></div>
    </div>

    <script>
    (function () {
      "use strict";

      /* ── Helpers ── */
      function decodeDeep(value) {
        var s = String(value == null ? "" : value).replace(/\+/g, " ");
        for (var i = 0; i < 4; i++) {
          try {
            var d = decodeURIComponent(s);
            if (d === s) break;
            s = d;
          } catch (e) { break; }
        }
        return s;
      }

      function qs(name) {
        var search = window.location.search.substring(1).split("&");
        for (var i = 0; i < search.length; i++) {
          var eq = search[i].indexOf("=");
          var k = eq >= 0 ? search[i].substring(0, eq) : search[i];
          var v = eq >= 0 ? search[i].substring(eq + 1) : "";
          if (decodeDeep(k) === name) return decodeDeep(v);
        }
        return "";
      }

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function byId(id) { return document.getElementById(id); }

      function bust(url) {
        return url + (url.indexOf("?") >= 0 ? "&" : "?") + "_t=" + Date.now();
      }

      function xhrJson(url, cb) {
        var x = new XMLHttpRequest();
        x.open("GET", bust(url), true);
        x.timeout = 15000;
        x.onreadystatechange = function () {
          if (x.readyState !== 4) return;
          if (x.status >= 200 && x.status < 300) {
            try { cb(null, JSON.parse(x.responseText)); }
            catch (e) { cb("JSON parse error"); }
          } else { cb("HTTP " + x.status); }
        };
        x.ontimeout = function () { cb("Timeout"); };
        x.onerror   = function () { cb("Network error"); };
        x.send(null);
      }

      function xhrText(url, cb) {
        var x = new XMLHttpRequest();
        x.open("GET", bust(url), true);
        x.timeout = 15000;
        x.onreadystatechange = function () {
          if (x.readyState !== 4) return;
          if (x.status >= 200 && x.status < 300) cb(null, x.responseText);
          else cb("HTTP " + x.status);
        };
        x.ontimeout = function () { cb("Timeout"); };
        x.onerror   = function () { cb("Net error"); };
        x.send(null);
      }

      /* ── Parse server list from URL params ──────────────────────────────────
         Supported modes:
         A) Multi correct:
            ?servers=VM1|http://v1.in-depth.com:3000,VM2|http://v2.in-depth.com:3000&batch_ids=b1,b2

         B) Multi accidentally sent through legacy fields:
            ?server_name=VM1%7Chttp%3A%2F%2Fv1.in-depth.com%3A3000%2CVM2%7Chttp%3A%2F%2Fv2.in-depth.com%3A3000
            &batch_id=b1%2Cb2

         C) Legacy single server:
            ?server_name=VM1&batch_id=b1
      */
      var SELF_BASE = window.location.protocol + "//" + window.location.host;

      function compactTrim(v) {
        return String(v == null ? "" : v).replace(/^\s+|\s+$/g, "");
      }

      function rawQueryDecoded() {
        var raw = window.location.search || "";
        if (raw.charAt(0) === "?") raw = raw.substring(1);
        return decodeDeep(raw);
      }

      function qsAny(names) {
        var raw1 = (window.location.search || "").replace(/^\?/, "");
        var raw2 = rawQueryDecoded();
        var variants = [raw1, raw2];

        for (var vi = 0; vi < variants.length; vi++) {
          var q = variants[vi] || "";
          var partsQ = q.split("&");
          for (var pi = 0; pi < partsQ.length; pi++) {
            var item = partsQ[pi];
            var eq = item.indexOf("=");
            if (eq < 0) continue;

            var k = decodeDeep(item.substring(0, eq));
            var v = decodeDeep(item.substring(eq + 1));

            for (var ni = 0; ni < names.length; ni++) {
              if (k === names[ni]) return v;
            }
          }
        }
        return "";
      }

      function splitList(v) {
        v = decodeDeep(v || "");
        if (!v) return [];
        var a = v.split(",");
        var out = [];
        for (var i = 0; i < a.length; i++) {
          var item = compactTrim(decodeDeep(a[i]));
          if (item) out.push(item);
        }
        return out;
      }

      function cleanApiBase(base) {
        base = compactTrim(decodeDeep(base || ""));
        if (!base) return SELF_BASE;
        if (!/^https?:\/\//i.test(base) && /^[A-Za-z0-9.-]+(:[0-9]+)?(\/.*)?$/.test(base)) {
          base = "http://" + base;
        }
        return base.replace(/\/+$/, "");
      }

      function pushParsedServer(pair, batchId, idx) {
        pair = compactTrim(decodeDeep(pair || ""));
        batchId = compactTrim(decodeDeep(batchId || ""));
        if (!batchId) return;

        var parts = pair.split("|");
        var sName = compactTrim(parts[0] || ("VM" + (idx + 1)));
        var sBase = compactTrim(parts.slice(1).join("|"));

        /* If name was blank but base exists, keep a useful label. */
        if (!sName && sBase) sName = "VM" + (idx + 1);

        servers.push({
          name: sName || ("VM" + (idx + 1)),
          apiBase: cleanApiBase(sBase || SELF_BASE),
          batchId: batchId
        });
      }

      var serversParam  = qsAny(["servers", "server_list", "server_name"]);
      var batchIdsParam = qsAny(["batch_ids", "batch_id"]);
      var legacySrv     = qsAny(["server_name"]);
      var legacyBatch   = qsAny(["batch_id"]);

      var servers = [];   // [{name, apiBase, batchId}]

      var sPairs = splitList(serversParam);
      var bIds   = splitList(batchIdsParam);

      /* Multi-server parse. This also fixes the FileMaker case where the multi
         server list was accidentally passed as server_name and the batch list
         was passed as batch_id. */
      if (sPairs.length && bIds.length && (sPairs.length > 1 || bIds.length > 1 || serversParam.indexOf("|") >= 0)) {
        var maxLen = Math.max(sPairs.length, bIds.length);
        for (var mi = 0; mi < maxLen; mi++) {
          pushParsedServer(sPairs[mi] || sPairs[0] || "", bIds[mi] || "", mi);
        }
      }

      if (!servers.length) {
        /* Legacy single-server fallback */
        servers.push({
          name:    compactTrim(legacySrv) || "Server",
          apiBase: SELF_BASE,
          batchId: compactTrim(legacyBatch)
        });
      }

      /* ── Per-server state ── */
      var state = servers.map(function (s) {
        return { server: s, done: false, lastRows: [], timer: null };
      });

      /* ── Build Tabs ── */
      var tabsBar  = byId("tabsBar");
      var tabPanes = byId("tabPanes");

      servers.forEach(function (s, idx) {
        /* Tab button */
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "tab-btn" + (idx === 0 ? " active" : "");
        btn.id = "tabBtn_" + idx;
        btn.innerHTML =
          '<span class="tab-dot ' + (s.batchId ? "running" : "idle") +
          '" id="dot_' + idx + '"></span>' + esc(s.name);
        (function (i) { btn.onclick = function () { activateTab(i); }; })(idx);
        tabsBar.appendChild(btn);

        /* Pane */
        var pane = document.createElement("div");
        pane.className = "tab-pane" + (idx === 0 ? " active" : "");
        pane.id = "tabPane_" + idx;

        if (!s.batchId) {
          pane.innerHTML = '<div class="no-batch">No batch ID assigned to ' + esc(s.name) + '.</div>';
        } else {
          pane.innerHTML =
            '<div class="srv-header">' +
              '<span class="muted">Server:</span>' +
              '<span class="server-pill">' + esc(s.name) + '</span>' +
              '<span class="muted" style="font-size:10px;">' + esc(s.apiBase) + '</span>' +
              '<span class="muted">Batch:</span>' +
              '<span class="pill">' + esc(s.batchId) + '</span>' +
              '<span class="status-pill" id="sPill_' + idx + '">Starting...</span>' +
            '</div>' +
            '<div class="prog-wrap">' +
              '<div class="muted" id="sTxt_' + idx + '" style="margin-bottom:3px;">Connecting...</div>' +
              '<div class="progress-bar"><div class="progress-fill" id="sFill_' + idx + '"></div></div>' +
              '<div class="pct-row">' +
                '<span id="sQueuedIn_' + idx + '">Queued in ' + esc(s.name) + '</span>' +
                '<span id="sPct_' + idx + '">0%</span>' +
              '</div>' +
            '</div>' +
            '<div class="log-header">Console log ' +
              '<button class="small-btn" onclick="clearLog(' + idx + ')">Clear</button>' +
            '</div>' +
            '<div class="console-box" id="sLog_' + idx + '">(no log yet)</div>';
        }
        tabPanes.appendChild(pane);
      });

      function activateTab(idx) {
        for (var i = 0; i < servers.length; i++) {
          var btn  = byId("tabBtn_"  + i);
          var pane = byId("tabPane_" + i);
          if (btn)  btn.className  = "tab-btn"  + (i === idx ? " active" : "");
          if (pane) pane.className = "tab-pane" + (i === idx ? " active" : "");
        }
      }

      window.clearLog = function (idx) {
        var box = byId("sLog_" + idx);
        if (box) box.textContent = "(log cleared)";
      };

      /* ── Result helpers ── */
      function getVal(row, keys, fb) {
        for (var i = 0; i < keys.length; i++) {
          if (row[keys[i]] != null && row[keys[i]] !== "") return row[keys[i]];
        }
        return fb || "";
      }

      function extractRows(j) {
        if (!j) return [];
        if (j.results && j.results.length != null) return j.results;
        if (j.data   && j.data.length    != null) return j.data;
        if (j.rows   && j.rows.length    != null) return j.rows;
        if (j.data   && j.data.results)            return j.data.results;
        return [];
      }

      function sslCls(v) {
        v = String(v || "");
        if (v==="A+"||v==="A"||v==="A-") return "good";
        if (v==="B"||v==="C")           return "warn";
        return "";
      }
      function psCls(v) {
        var n = parseInt(v, 10);
        if (isNaN(n)) return "";
        return n >= 90 ? "good" : n >= 50 ? "warn" : "bad";
      }

      function healthCls(v) {
        v = String(v || "").toUpperCase();
        if (v === "PASS" || v === "SUCCESS" || v === "OK") return "good";
        if (v === "WARN" || v === "WARNING") return "warn";
        if (v === "FAIL" || v === "ERROR") return "bad";
        return "";
      }

      /* ── Merge & render all rows ── */
      function rebuildResults() {
        var allRows = [];
        for (var i = 0; i < state.length; i++) {
          var rows = state[i].lastRows;
          for (var j = 0; j < rows.length; j++) allRows.push(rows[j]);
        }

        var allDone = true;
        for (var k = 0; k < state.length; k++) {
          if (!state[k].done && state[k].server.batchId) { allDone = false; break; }
        }
        if (allDone && allRows.length) byId("doneBanner").style.display = "block";

        if (!allRows.length) { byId("resultPanel").style.display = "none"; byId("summaryPanel").style.display = "none"; return; }

        /* Summary */
        var total = allRows.length, success = 0, failed = 0, psSum = 0, psCount = 0, inDepthOk = 0, inDepthWarn = 0, inDepthFail = 0;
        for (var r = 0; r < allRows.length; r++) {
          var ssl = getVal(allRows[r], ["SSL_Grade","ssl_grade","SSL","ssl"], "");
          if (ssl && ssl !== "N/A" && ssl !== "ERROR") success++; else failed++;
          var n = parseInt(getVal(allRows[r], ["PageSpeed_Performance","pagespeed","performance","PageSpeed"], ""), 10);
          if (!isNaN(n)) { psSum += n; psCount++; }

          var ih = String(getVal(allRows[r], ["InDepthDNS_OverallHealth","InDepthDNS_Status"], "")).toUpperCase();
          if (ih === "PASS" || ih === "SUCCESS" || ih === "OK") inDepthOk++;
          else if (ih === "WARN" || ih === "WARNING") inDepthWarn++;
          else if (ih === "FAIL" || ih === "ERROR") inDepthFail++;
        }
        byId("summaryStats").innerHTML =
          '<div class="mini-box"><div class="mini-number">'              + total   + '</div><div class="mini-label">Loaded</div></div>' +
          '<div class="mini-box"><div class="mini-number good">'         + success + '</div><div class="mini-label">SSL OK</div></div>' +
          '<div class="mini-box"><div class="mini-number bad">'          + failed  + '</div><div class="mini-label">Failed</div></div>' +
          '<div class="mini-box"><div class="mini-number">'              + (psCount ? Math.round(psSum/psCount) : "—") + '</div><div class="mini-label">Avg Speed</div></div>' +
          '<div class="mini-box"><div class="mini-number good">'         + inDepthOk + '</div><div class="mini-label">INDepthDNS OK</div></div>' +
          '<div class="mini-box"><div class="mini-number warn">'         + inDepthWarn + '</div><div class="mini-label">INDepthDNS Warn</div></div>' +
          '<div class="mini-box"><div class="mini-number bad">'          + inDepthFail + '</div><div class="mini-label">INDepthDNS Fail</div></div>' +
          '<div class="mini-box"><div class="mini-number">'              + servers.length + '</div><div class="mini-label">Servers</div></div>';
        byId("summaryPanel").style.display = "block";

        /* Table — add Server column when >1 server */
        var multiSrv = servers.length > 1;
        var domW = multiSrv ? "14%" : "18%";
        var html = '<table class="result-table"><thead><tr>';
        html += '<th style="width:' + domW + ';">Domain</th>';
        if (multiSrv) html += '<th style="width:5%;">VM</th>';
        html += '<th style="width:6%;">SSL</th>';
        html += '<th style="width:9%;">Sucuri</th>';
        html += '<th style="width:8%;">Speed</th>';
        html += '<th style="width:8%;">Pingdom</th>';
        html += '<th style="width:7%;">DNS</th>';
        html += '<th style="width:10%;">INDepthDNS</th>';
        html += '<th style="width:7%;">Rank</th>';
        html += '<th style="width:10%;">IP</th>';
        html += '<th style="width:7%;">State</th>';
        html += '</tr></thead><tbody>';

        for (var ri = 0; ri < allRows.length; ri++) {
          var row   = allRows[ri];
          var dom   = getVal(row, ["Domain","domain","Host","host"], "Unknown");
          var srv   = getVal(row, ["_server","server_name"], "");
          var ssl2  = getVal(row, ["SSL_Grade","ssl_grade","SSL","ssl"], "N/A");
          var suc   = getVal(row, ["Sucuri_Overall","Sucuri_Result","sucuri","Sucuri"], "N/A");
          var ps    = getVal(row, ["PageSpeed_Performance","pagespeed","performance","PageSpeed"], "N/A");
          var ping  = getVal(row, ["Pingdom_Grade","pingdom","Pingdom"], "N/A");
          var dns   = getVal(row, ["DNS_PropagationRate","DNS_Propagation","dns","DNS"], "N/A");
          var indepth = getVal(row, ["InDepthDNS_OverallHealth","InDepthDNS_Status","indepthdns","INDepthDNS"], "N/A");
          var pr    = getVal(row, ["PageRank_Integer","PageRank","pagerank","page_rank"], "N/A");
          var ip    = getVal(row, ["Server_IP_Address","Server_IP","ip","IP"], "N/A");
          var st    = getVal(row, ["Status","status","state","State"], "done");
          html += '<tr>';
          html += '<td class="domain-cell" title="' + esc(dom) + '">' + esc(dom) + '</td>';
          if (multiSrv) html += '<td><span class="srv-tag">' + esc(srv) + '</span></td>';
          html += '<td class="' + sslCls(ssl2) + '">' + esc(ssl2) + '</td>';
          html += '<td>' + esc(suc) + '</td>';
          html += '<td class="' + psCls(ps) + '">' + esc(ps) + '</td>';
          html += '<td>' + esc(ping) + '</td>';
          html += '<td>' + esc(dns) + '</td>';
          html += '<td class="' + healthCls(indepth) + '">' + esc(indepth) + '</td>';
          html += '<td>' + esc(pr) + '</td>';
          html += '<td title="' + esc(ip) + '">' + esc(ip) + '</td>';
          html += '<td>' + esc(st) + '</td>';
          html += '</tr>';
        }
        html += '</tbody></table>';
        byId("resultsBox").innerHTML = html;
        byId("resultPanel").style.display = "block";
      }

      /* ── Poll one server ── */
      function pollServer(idx) {
        var st  = state[idx];
        var srv = st.server;
        if (st.done || !srv.batchId) return;

        /* Progress */
        xhrJson(srv.apiBase + "/multi-progress?batch_id=" + encodeURIComponent(srv.batchId),
          function (err, j) {
            if (err) {
              byId("sTxt_" + idx).textContent = "Progress unavailable: " + err;
              return;
            }
            var p         = (j && j.progress) ? j.progress : {};
            var completed = parseInt(p.completed || "0", 10) || 0;
            var total     = parseInt(p.total     || "1", 10) || 1;
            var pct       = Math.min(100, Math.round(completed / total * 100));
            var status    = String(p.status || "Running");
            var isDone    = /^(done|complete|finished)/i.test(status);

            byId("sFill_"     + idx).style.width = pct + "%";
            byId("sPct_"      + idx).textContent = pct + "%";
            byId("sTxt_"      + idx).textContent = status;
            byId("sQueuedIn_" + idx).textContent = "Batch running - " + completed + " / " + total + " — Queued in " + srv.name;

            if (isDone || pct >= 100) {
              byId("sFill_"  + idx).className = "progress-fill done";
              byId("sPill_"  + idx).textContent = "Done";
              byId("sPill_"  + idx).className   = "status-pill done";
              byId("dot_"    + idx).className   = "tab-dot done";
              byId("tabBtn_" + idx).style.color = "#1f8b3a";
              st.done = true;
              if (st.timer) { clearInterval(st.timer); st.timer = null; }
              rebuildResults();
            } else {
              byId("sPill_" + idx).textContent = "Running...";
              byId("sPill_" + idx).className   = "status-pill";
              byId("dot_"   + idx).className   = "tab-dot running";
            }
          }
        );

        /* Log */
        xhrText(srv.apiBase + "/multi-log?batch_id=" + encodeURIComponent(srv.batchId),
          function (err, text) {
            if (err) return;
            var box   = byId("sLog_" + idx);
            if (!box) return;
            var lines = (text || "").split("\n");
            var start = lines.length > 60 ? lines.length - 60 : 0;
            box.textContent = lines.slice(start).join("\n") || "(no log yet)";
            box.scrollTop   = box.scrollHeight;
          }
        );

        /* Results */
        xhrJson(srv.apiBase + "/multi-result?batch_id=" + encodeURIComponent(srv.batchId),
          function (err, j) {
            if (err || !j) return;
            var rows = extractRows(j);
            if (!rows.length) return;
            /* Tag each row with the server name for the combined table */
            var tagged = [];
            for (var i = 0; i < rows.length; i++) {
              var copy = {};
              for (var k in rows[i]) {
                if (Object.prototype.hasOwnProperty.call(rows[i], k)) copy[k] = rows[i][k];
              }
              copy._server = srv.name;
              tagged.push(copy);
            }
            st.lastRows = tagged;
            rebuildResults();
          }
        );
      }

      /* ── Start all server polls ── */
      function startAll() {
        for (var idx = 0; idx < servers.length; idx++) {
          (function (i) {
            var srv = servers[i];
            if (!srv.batchId) {
              var dot = byId("dot_" + i);
              if (dot) dot.className = "tab-dot idle";
              return;
            }
            /* Stagger first poll slightly so tabs appear instantly */
            setTimeout(function () { pollServer(i); }, i * 200);
            state[i].timer = setInterval(function () { pollServer(i); }, 5000);
          })(idx);
        }
      }

      window.onload = startAll;

    })();
    </script>
  </body>
</html>
