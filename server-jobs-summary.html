<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SSL Checker - Server Jobs Summary</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #f5f7fc;
        color: #071225;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        padding: 18px 24px;
      }
      .page-wrap { max-width: 1320px; margin: 0 auto; }
      .aggregate-bar {
        background: #071225;
        color: #fff;
        border: 1px solid #17233a;
        padding: 20px 24px;
        margin: 0 0 24px 0;
        min-height: 86px;
      }
      .aggregate-left {
        float: left;
        width: 45%;
      }
      .aggregate-icon {
        display: inline-block;
        width: 38px;
        height: 38px;
        line-height: 38px;
        text-align: center;
        background: #0f4e78;
        border-radius: 8px;
        color: #9ee8ff;
        font-size: 18px;
        margin-right: 12px;
        vertical-align: middle;
      }
      .aggregate-title-wrap { display: inline-block; vertical-align: middle; }
      .aggregate-title { font-size: 16px; font-weight: 800; line-height: 1.2; }
      .aggregate-subtitle { color: #aab6c8; font-size: 11px; font-weight: 700; margin-top: 2px; }
      .aggregate-stats {
        float: right;
        width: 55%;
        text-align: right;
        white-space: nowrap;
      }
      .aggregate-stat {
        display: inline-block;
        min-width: 116px;
        padding-top: 2px;
        vertical-align: top;
        text-align: center;
      }
      .aggregate-label {
        color: #8f9bb0;
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      .aggregate-value {
        font-size: 23px;
        line-height: 1.2;
        font-weight: 900;
        color: #fff;
        margin-top: 3px;
      }
      .clear { clear: both; }
      .toolbar {
        margin: 0 0 18px 0;
        color: #6b7588;
        font-size: 11px;
      }
      .toolbar-left { float: left; }
      .toolbar-right { float: right; }
      .server-pill {
        display: inline-block;
        padding: 3px 9px;
        margin: 0 4px 5px 0;
        background: #e9f7fc;
        color: #076f8f;
        font-weight: 800;
        font-size: 10px;
        text-transform: uppercase;
      }
      .refresh-button {
        height: 28px;
        border: 1px solid #cdd5e3;
        background: #fff;
        color: #071225;
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        padding: 0 12px;
      }
      .refresh-button:hover { background: #eff4fb; }
      .cards { font-size: 0; margin: 0 -10px; }
      .server-card {
        display: inline-block;
        vertical-align: top;
        width: calc(33.333% - 20px);
        min-width: 285px;
        margin: 0 10px 22px 10px;
        background: #fff;
        border: 1px solid #cdd3df;
        padding: 24px 22px 22px 22px;
        font-size: 13px;
        min-height: 344px;
      }
      .server-card.offline { border-color: #e4a6ac; }
      .card-head { margin-bottom: 4px; }
      .server-name {
        float: left;
        font-weight: 900;
        font-size: 16px;
        color: #071225;
        max-width: 70%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .status-tag {
        float: right;
        background: #e9f7fc;
        color: #08738f;
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        padding: 5px 7px;
        line-height: 1;
      }
      .status-tag.idle { background: #f1f3f7; color: #6c7480; }
      .status-tag.offline { background: #fdecee; color: #b02030; }
      .projection-kicker {
        font-size: 10px;
        color: #2e3645;
        font-weight: 900;
        letter-spacing: .04em;
        text-transform: uppercase;
        margin: 7px 0 22px 0;
      }
      .scan-end-label {
        font-size: 10px;
        color: #667185;
        font-weight: 900;
        letter-spacing: .06em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .scan-end-value {
        font-size: 14px;
        line-height: 1.25;
        font-weight: 900;
        color: #071225;
        margin-bottom: 16px;
      }
      .two-metrics { border-bottom: 1px solid #dfe4ec; padding-bottom: 14px; margin-bottom: 16px; }
      .metric-half { display: inline-block; width: 48%; vertical-align: top; }
      .metric-half + .metric-half { margin-left: 4%; }
      .metric-label {
        color: #667185;
        font-size: 9px;
        font-weight: 900;
        letter-spacing: .06em;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .metric-value {
        font-size: 30px;
        line-height: 1;
        font-weight: 900;
        color: #071225;
      }
      .metric-value.small-fit { font-size: 24px; line-height: 1.1; }
      .domain-row {
        font-size: 11px;
        font-weight: 900;
        color: #667185;
        text-transform: uppercase;
        letter-spacing: .05em;
        margin: 0 0 10px 0;
      }
      .domain-row span { float: right; color: #071225; font-size: 12px; letter-spacing: 0; }
      .progress-track {
        height: 5px;
        background: #e9eef8;
        overflow: hidden;
        margin: 10px 0 22px 0;
      }
      .progress-fill {
        height: 5px;
        background: #057994;
        width: 0%;
      }
      .rate-row { font-size: 0; }
      .rate-box {
        display: inline-block;
        width: 48%;
        background: #eef4ff;
        padding: 13px 13px 12px 13px;
        font-size: 12px;
        vertical-align: top;
        min-height: 58px;
      }
      .rate-box + .rate-box { margin-left: 4%; }
      .rate-label {
        color: #667185;
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: .05em;
      }
      .rate-value {
        font-size: 17px;
        line-height: 1.1;
        font-weight: 900;
        color: #071225;
        margin-top: 3px;
      }
      .empty-message {
        font-size: 12px;
        color: #7b8493;
        line-height: 1.45;
        padding: 20px 0 4px 0;
      }
      .offline-message {
        font-size: 12px;
        color: #b02030;
        line-height: 1.45;
        margin-top: 22px;
        word-break: break-word;
      }
      .mini-line {
        margin-top: 12px;
        color: #8b95a6;
        font-size: 10px;
        line-height: 1.35;
      }
      @media (max-width: 1040px) {
        .server-card { width: calc(50% - 20px); }
        .aggregate-left, .aggregate-stats { float: none; width: 100%; text-align: left; }
        .aggregate-stats { margin-top: 14px; }
        .aggregate-stat { text-align: left; min-width: 100px; }
      }
      @media (max-width: 680px) {
        body { padding: 12px; }
        .server-card { width: calc(100% - 20px); }
        .toolbar-left, .toolbar-right { float: none; margin-bottom: 8px; }
        .metric-value { font-size: 26px; }
        .aggregate-stat { display: block; margin-top: 10px; }
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      <div class="aggregate-bar">
        <div class="aggregate-left">
          <span class="aggregate-icon">▣</span>
          <span class="aggregate-title-wrap">
            <div class="aggregate-title">Aggregate Projection</div>
            <div class="aggregate-subtitle" id="aggregateSubtitle">Calculated across all active nodes</div>
          </span>
        </div>
        <div class="aggregate-stats">
          <div class="aggregate-stat">
            <div class="aggregate-label">Avg. Completion</div>
            <div class="aggregate-value" id="aggCompletion">0%</div>
          </div>
          <div class="aggregate-stat">
            <div class="aggregate-label">Fleet Efficiency</div>
            <div class="aggregate-value" id="aggEfficiency">Idle</div>
          </div>
          <div class="aggregate-stat">
            <div class="aggregate-label">Next Window</div>
            <div class="aggregate-value" id="aggNextWindow">--:--</div>
          </div>
        </div>
        <div class="clear"></div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <span id="serverPills"></span>
          <span id="batchNote"></span>
        </div>
        <div class="toolbar-right">
          <span id="lastUpdated">Loading...</span>
          <button class="refresh-button" type="button" onclick="refreshAll()">Refresh Now</button>
        </div>
        <div class="clear"></div>
      </div>

      <div id="cards" class="cards"></div>
    </div>

    <script>
    (function () {
      var DEFAULT_GAP = parseFloat(getParam("minutes_gap") || getParam("gap") || "20");
      if (isNaN(DEFAULT_GAP) || DEFAULT_GAP <= 0) DEFAULT_GAP = 20;

      var refreshSec = parseInt(getParam("refresh") || "15", 10);
      if (isNaN(refreshSec) || refreshSec < 5) refreshSec = 15;

      var SERVERS = parseServers();
      var BATCH_FILTER = parseBatchIds();
      var summaries = [];
      var timer = null;

      function byId(id) { return document.getElementById(id); }

      function safeDecode(value) {
        var out = String(value || "").replace(/\+/g, " ");
        for (var i = 0; i < 5; i++) {
          try {
            var decoded = decodeURIComponent(out);
            if (decoded === out) break;
            out = decoded;
          } catch (e) { break; }
        }
        return out;
      }

      function getParam(name) {
        var qs = window.location.search.substring(1);
        if (!qs) return "";
        var parts = qs.split("&");
        for (var i = 0; i < parts.length; i++) {
          var pair = parts[i].split("=");
          if (safeDecode(pair[0] || "") === name) return safeDecode(pair.slice(1).join("=") || "");
        }
        return "";
      }

      function parseServers() {
        var raw = safeDecode(getParam("servers"));
        if (raw) {
          var arr = raw.split(",");
          var out = [];
          for (var i = 0; i < arr.length; i++) {
            var s = safeDecode(arr[i]).replace(/^\s+|\s+$/g, "");
            if (!s) continue;
            var parts = s.split("|");
            var name = safeDecode(parts[0] || s).replace(/^\s+|\s+$/g, "");
            var base = safeDecode(parts[1] || parts[0] || "").replace(/^\s+|\s+$/g, "");
            if (base.charAt(base.length - 1) === "/") base = base.substring(0, base.length - 1);
            if (base) out.push({ name: name || base, base: base });
          }
          return out;
        }

        var host = getParam("host") || getParam("server_host") || window.location.hostname;
        var port = getParam("port") || "3000";
        var name = getParam("server_name") || host;
        return [{ name: name, base: "http://" + host + ":" + port }];
      }

      function parseBatchIds() {
        var raw = safeDecode(getParam("batch_ids") || getParam("batch_id") || "");
        if (!raw) return [];
        var parts = raw.split(/[,\n\r\s]+/);
        var out = [];
        var seen = {};
        for (var i = 0; i < parts.length; i++) {
          var id = safeDecode(parts[i]).replace(/^\s+|\s+$/g, "");
          if (!id || !/^[A-Za-z0-9_-]+$/.test(id)) continue;
          if (!seen[id]) {
            seen[id] = true;
            out.push(id);
          }
        }
        return out;
      }

      function esc(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function fixSpaces(value) { return String(value || "").replace(/%20/g, " "); }

      function noCacheUrl(url) {
        return url + (url.indexOf("?") >= 0 ? "&" : "?") + "_ts=" + encodeURIComponent(new Date().getTime());
      }

      function xhrJson(url, ok, fail) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", noCacheUrl(url), true);
        xhr.timeout = 10000;
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) return;
          try {
            if (xhr.status >= 200 && xhr.status < 300) ok(JSON.parse(xhr.responseText));
            else if (fail) fail("HTTP " + xhr.status);
          } catch (e) {
            if (fail) fail(e.message || String(e));
          }
        };
        xhr.onerror = function () { if (fail) fail("network error"); };
        xhr.ontimeout = function () { if (fail) fail("timeout"); };
        xhr.send(null);
      }

      function matchesBatchFilter(job) {
        if (!BATCH_FILTER.length) return true;
        var id = String((job && (job.batchId || job.batch_id || job.jobId || job.job_id || job.key)) || "");
        for (var i = 0; i < BATCH_FILTER.length; i++) {
          if (id === BATCH_FILTER[i] || String(job && job.key || "") === "multi:" + BATCH_FILTER[i]) return true;
        }
        return false;
      }

      function normalizeStatus(value) {
        var s = String(value || "").toLowerCase();
        if (s.indexOf("done") === 0 || s === "complete" || s === "completed" || s === "success") return "done";
        if (s.indexOf("fail") === 0 || s.indexOf("error") === 0 || s.indexOf("dead") === 0) return "failed";
        if (s.indexOf("process") === 0 || s.indexOf("run") === 0 || s.indexOf("scan") === 0 || s.indexOf("check") === 0 || s.indexOf("upload") === 0 || s.indexOf("start") === 0) return "processing";
        if (s.indexOf("waiting") === 0 || s.indexOf("queued") === 0 || s === "") return "queued";
        return "queued";
      }

      function isFinalJob(job) {
        var s = normalizeStatus(job && job.status);
        return s === "done" || s === "failed";
      }

      function num() {
        for (var i = 0; i < arguments.length; i++) {
          var v = arguments[i];
          if (v === null || typeof v === "undefined" || v === "") continue;
          var n = parseFloat(v);
          if (!isNaN(n)) return n;
        }
        return 0;
      }

      function countStatus(items, status) {
        var n = 0;
        items = items || [];
        for (var i = 0; i < items.length; i++) {
          if (normalizeStatus(items[i] && items[i].status) === status) n++;
        }
        return n;
      }

      function getScanSettings(progressData) {
        var meta = progressData && progressData.meta ? progressData.meta : {};
        return meta.scanSettings || meta.scan_settings || progressData.scanSettings || progressData.scan_settings || {};
      }

      function extractRates(progressData, fallbackGap) {
        var meta = progressData && progressData.meta ? progressData.meta : {};
        var settings = getScanSettings(progressData);
        var gap = num(settings.minutes_gap, settings.minutesGap, meta.minutesGap, meta.minutes_gap, progressData.minutes_gap, fallbackGap, DEFAULT_GAP);
        if (gap <= 0) gap = DEFAULT_GAP;

        var perHour = num(settings.domains_per_hour, settings.domainsPerHour, meta.domains_per_hour, progressData.domains_per_hour);
        var perDay = num(settings.domains_per_day, settings.domainsPerDay, meta.domains_per_day, progressData.domains_per_day);
        if (perHour <= 0 && gap > 0) perHour = 60 / gap;
        if (perDay <= 0 && perHour > 0) perDay = perHour * 24;

        return { gap: gap, perHour: perHour, perDay: perDay };
      }

      function summarizeServer(server, jobs, progressMap) {
        var total = 0, done = 0, failed = 0, processing = 0, queued = 0;
        var gap = DEFAULT_GAP;
        var perHour = 60 / DEFAULT_GAP;
        var perDay = perHour * 24;
        var activeJobs = 0;
        var filteredJobs = [];

        for (var i = 0; i < jobs.length; i++) {
          if (matchesBatchFilter(jobs[i])) filteredJobs.push(jobs[i]);
        }

        for (var j = 0; j < filteredJobs.length; j++) {
          var job = filteredJobs[j] || {};
          if (isFinalJob(job)) continue;
          activeJobs++;

          if (job.type === "multi") {
            var pData = job.batchId && progressMap ? progressMap[job.batchId] : null;
            var domains = (pData && pData.domains) || job.domains || [];
            var statuses = (pData && pData.domain_statuses) || job.domain_statuses || [];
            var t = num(pData && pData.domain_count, job.domain_count, job.total_domains, job.total, domains.length);
            var d = num(pData && pData.done_count, job.done_count, countStatus(statuses, "done"));
            var f = num(pData && pData.failed_count, job.failed_count, countStatus(statuses, "failed"));
            var pr = num(pData && pData.processing_count, job.processing_count, countStatus(statuses, "processing"));
            var q = num(pData && pData.queued_count, job.queued_count, countStatus(statuses, "queued"));

            if (t <= 0) t = d + f + pr + q;
            total += t;
            done += d;
            failed += f;
            processing += pr;
            queued += q;

            if (pData) {
              var rates = extractRates(pData, gap);
              gap = rates.gap;
              perHour = rates.perHour;
              perDay = rates.perDay;
            }
          } else {
            total += 1;
            var js = normalizeStatus(job.status || "processing");
            if (js === "failed") failed += 1;
            else if (js === "done") done += 1;
            else if (js === "queued") queued += 1;
            else processing += 1;
          }
        }

        var scanned = done + failed;
        var remaining = Math.max(0, total - scanned);
        var completion = total > 0 ? (scanned / total) * 100 : 0;
        var etaMinutes = remaining * gap;
        var projectionEnd = total > 0 ? new Date(new Date().getTime() + etaMinutes * 60000) : null;

        return {
          ok: true,
          server: server,
          jobs: filteredJobs.length,
          activeJobs: activeJobs,
          total: Math.round(total),
          done: Math.round(done),
          failed: Math.round(failed),
          processing: Math.round(processing),
          queued: Math.round(queued),
          scanned: Math.round(scanned),
          remaining: Math.round(remaining),
          completion: completion,
          minutesGap: gap,
          perHour: perHour,
          perDay: perDay,
          etaMinutes: etaMinutes,
          projectionEnd: projectionEnd
        };
      }

      function fetchServer(server, callback) {
        xhrJson(server.base + "/jobs", function (data) {
          var rawJobs = data && data.jobs ? data.jobs : [];
          var jobs = [];
          for (var i = 0; i < rawJobs.length; i++) {
            if (matchesBatchFilter(rawJobs[i])) jobs.push(rawJobs[i]);
          }

          var multiJobs = [];
          for (var j = 0; j < jobs.length; j++) {
            if (jobs[j] && jobs[j].type === "multi" && jobs[j].batchId) multiJobs.push(jobs[j]);
          }

          if (!multiJobs.length) {
            callback(summarizeServer(server, jobs, {}));
            return;
          }

          var progressMap = {};
          var left = multiJobs.length;
          for (var x = 0; x < multiJobs.length; x++) {
            (function (job) {
              xhrJson(server.base + "/multi-progress?batch_id=" + encodeURIComponent(job.batchId), function (pData) {
                progressMap[job.batchId] = pData || {};
                doneOne();
              }, function () { doneOne(); });
            })(multiJobs[x]);
          }

          function doneOne() {
            left--;
            if (left <= 0) callback(summarizeServer(server, jobs, progressMap));
          }
        }, function (err) {
          callback({
            ok: false,
            server: server,
            error: err || "Cannot reach server",
            jobs: 0,
            activeJobs: 0,
            total: 0,
            done: 0,
            failed: 0,
            processing: 0,
            queued: 0,
            scanned: 0,
            remaining: 0,
            completion: 0,
            minutesGap: DEFAULT_GAP,
            perHour: 60 / DEFAULT_GAP,
            perDay: (60 / DEFAULT_GAP) * 24,
            etaMinutes: 0,
            projectionEnd: null
          });
        });
      }

      function formatDateLong(dt) {
        if (!dt) return "--";
        try {
          return dt.toLocaleString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric",
            hour: "numeric",
            minute: "2-digit",
            hour12: true
          });
        } catch (e) { return String(dt); }
      }

      function formatTime24(dt) {
        if (!dt) return "--:--";
        try {
          var h = dt.getHours();
          var m = dt.getMinutes();
          return (h < 10 ? "0" + h : String(h)) + ":" + (m < 10 ? "0" + m : String(m));
        } catch (e) { return "--:--"; }
      }

      function formatDuration(mins) {
        mins = Math.max(0, Math.round(num(mins)));
        var days = Math.floor(mins / 1440);
        var hours = Math.floor((mins % 1440) / 60);
        var minutes = mins % 60;
        if (days > 0) return days + "d " + hours + "h" + (minutes > 0 ? " " + minutes + "m" : "");
        if (hours > 0) return hours + "h" + (minutes > 0 ? " " + minutes + "m" : "");
        return minutes + "m";
      }

      function formatNumber(n, decimals) {
        n = parseFloat(n || 0);
        if (!isFinite(n)) return "0";
        if (typeof decimals === "number") return n.toFixed(decimals);
        if (Math.abs(n - Math.round(n)) < 0.001) return String(Math.round(n));
        return n.toFixed(1).replace(/\.0$/, "");
      }

      function renderPills() {
        var html = "";
        for (var i = 0; i < SERVERS.length; i++) {
          html += '<span class="server-pill" title="' + esc(SERVERS[i].base) + '">' + esc(fixSpaces(SERVERS[i].name)) + '</span>';
        }
        byId("serverPills").innerHTML = html || '<span>No servers configured</span>';
        byId("batchNote").innerHTML = BATCH_FILTER.length ? 'Showing current batches: ' + esc(BATCH_FILTER.length) : 'Showing all active jobs';
      }

      function renderCard(s) {
        var name = fixSpaces((s.server && s.server.name) || "Server");
        var statusClass = !s.ok ? "offline" : (s.total > 0 ? "active" : "idle");
        var statusLabel = !s.ok ? "Offline" : (s.total > 0 ? "Active" : "Idle");
        var pct = Math.max(0, Math.min(100, s.completion || 0));
        var etaText = s.total > 0 ? formatDuration(s.etaMinutes) : "--";
        var bigClass = etaText.length > 7 ? "metric-value small-fit" : "metric-value";

        var html = '';
        html += '<div class="server-card ' + (!s.ok ? 'offline' : '') + '">';
        html += '<div class="card-head">';
        html += '<div class="server-name" title="' + esc(name) + '">Server Name: ' + esc(name) + '</div>';
        html += '<div class="status-tag ' + esc(statusClass) + '">' + esc(statusLabel) + '</div>';
        html += '<div class="clear"></div>';
        html += '</div>';
        html += '<div class="projection-kicker">◷ Scan Time Projection</div>';

        if (!s.ok) {
          html += '<div class="offline-message">Cannot reach ' + esc(s.server && s.server.base || '') + '<br>' + esc(s.error || '') + '</div>';
          html += '</div>';
          return html;
        }

        if (s.total <= 0) {
          html += '<div class="scan-end-label">Projection scan end</div>';
          html += '<div class="scan-end-value">No active scan</div>';
          html += '<div class="empty-message">No queued or running domains were found for this server.</div>';
          html += '<div class="rate-row">';
          html += '<div class="rate-box"><div class="rate-label">Per Hour</div><div class="rate-value">' + esc(formatNumber(s.perHour)) + ' domains</div></div>';
          html += '<div class="rate-box"><div class="rate-label">Per Day</div><div class="rate-value">' + esc(formatNumber(s.perDay)) + ' domains</div></div>';
          html += '</div>';
          html += '</div>';
          return html;
        }

        html += '<div class="scan-end-label">Projection scan end</div>';
        html += '<div class="scan-end-value">' + esc(formatDateLong(s.projectionEnd)) + '</div>';
        html += '<div class="two-metrics">';
        html += '<div class="metric-half"><div class="metric-label">Minutes Gap</div><div class="metric-value">' + esc(formatNumber(s.minutesGap)) + 'm</div></div>';
        html += '<div class="metric-half"><div class="metric-label">Estimated Time Left</div><div class="' + esc(bigClass) + '">' + esc(etaText) + '</div></div>';
        html += '</div>';
        html += '<div class="domain-row">Total Domains <span>' + esc(s.total) + '</span><div class="clear"></div></div>';
        html += '<div class="domain-row">Remaining <span>' + esc(s.remaining) + '</span><div class="clear"></div></div>';
        html += '<div class="progress-track"><div class="progress-fill" style="width:' + esc(formatNumber(pct, 2)) + '%"></div></div>';
        html += '<div class="rate-row">';
        html += '<div class="rate-box"><div class="rate-label">Per Hour</div><div class="rate-value">' + esc(formatNumber(s.perHour)) + ' domains</div></div>';
        html += '<div class="rate-box"><div class="rate-label">Per Day</div><div class="rate-value">' + esc(formatNumber(s.perDay)) + ' domains</div></div>';
        html += '</div>';
        html += '<div class="mini-line">Scanned ' + esc(s.scanned) + '/' + esc(s.total) + ' · Done ' + esc(s.done) + ' · Failed ' + esc(s.failed) + ' · Processing ' + esc(s.processing) + ' · Queued ' + esc(s.queued) + '</div>';
        html += '</div>';
        return html;
      }

      function fleetEfficiency(totalServers, activeServers, offlineServers, total, remaining) {
        if (offlineServers > 0) return "Medium";
        if (activeServers <= 0) return "Idle";
        if (total > 0 && remaining === 0) return "Done";
        if (activeServers >= Math.max(1, Math.ceil(totalServers * 0.7))) return "High";
        if (activeServers >= Math.max(1, Math.ceil(totalServers * 0.35))) return "Medium";
        return "Low";
      }

      function renderAll() {
        var html = "";
        var total = 0, scanned = 0, remaining = 0, active = 0, offline = 0;
        var nextWindow = null;

        for (var i = 0; i < summaries.length; i++) {
          var s = summaries[i];
          html += renderCard(s);
          if (!s.ok) { offline++; continue; }
          total += s.total || 0;
          scanned += s.scanned || 0;
          remaining += s.remaining || 0;
          if ((s.total || 0) > 0) active++;
          if (s.projectionEnd && (!nextWindow || s.projectionEnd.getTime() < nextWindow.getTime())) nextWindow = s.projectionEnd;
        }

        byId("cards").innerHTML = html || '<div class="server-card"><div class="empty-message">No servers configured.</div></div>';
        var avg = total > 0 ? (scanned / total) * 100 : 0;
        byId("aggCompletion").innerHTML = formatNumber(avg, 1) + "%";
        byId("aggEfficiency").innerHTML = fleetEfficiency(SERVERS.length, active, offline, total, remaining);
        byId("aggNextWindow").innerHTML = formatTime24(nextWindow);
        byId("aggregateSubtitle").innerHTML = "Calculated across " + active + " active node" + (active === 1 ? "" : "s");
        byId("lastUpdated").innerHTML = "Updated " + new Date().toLocaleTimeString() + " · Refresh " + refreshSec + "s";
      }

      function fetchAll() {
        if (!SERVERS.length) { summaries = []; renderAll(); return; }
        var left = SERVERS.length;
        var out = [];
        for (var i = 0; i < SERVERS.length; i++) {
          (function (idx, server) {
            fetchServer(server, function (summary) {
              out[idx] = summary;
              left--;
              if (left <= 0) {
                summaries = out;
                renderAll();
              }
            });
          })(i, SERVERS[i]);
        }
      }

      window.refreshAll = function () { fetchAll(); };

      window.onload = function () {
        renderPills();
        fetchAll();
        if (timer) clearInterval(timer);
        timer = setInterval(fetchAll, refreshSec * 1000);
      };
    })();
    </script>
  </body>
</html>
