<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>SSL Checker — Live Progress</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 14px;
        background: #f3f3f3;
        color: #222;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
      }
      .page-title {
        font-size: 16px;
        font-weight: bold;
        margin: 0 0 10px 0;
      }
      .panel {
        background: #fff;
        border: 1px solid #d8d8d8;
        border-radius: 10px;
        padding: 14px 18px;
        margin-bottom: 12px;
      }
      .scan-row {
        line-height: 28px;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
      .domain-pill {
        display: inline-block;
        padding: 3px 12px;
        background: #e8f0fa;
        color: #185fa5;
        border-radius: 14px;
        font-weight: bold;
        margin-left: 8px;
        margin-right: 8px;
      }
      .server-pill {
        display: inline-block;
        padding: 3px 12px;
        background: #f0faf4;
        color: #1f8b3a;
        border-radius: 14px;
        font-weight: bold;
        margin-left: 8px;
        margin-right: 4px;
      }
      .status-pill {
        display: inline-block;
        padding: 3px 12px;
        border-radius: 14px;
        font-size: 12px;
        font-weight: bold;
        background: #185fa5;
        color: #fff;
      }
      .section-title {
        font-size: 14px;
        font-weight: bold;
        margin: 0 0 10px 0;
      }
      .status-text {
        margin-bottom: 6px;
        color: #4b4b4b;
      }
      .progress-wrap {
        position: relative;
        margin-top: 2px;
      }
      .progress-bar {
        width: 100%;
        height: 9px;
        background: #dedede;
        border-radius: 20px;
        overflow: hidden;
      }
      .progress-fill {
        width: 0%;
        height: 9px;
        background: #1f78d1;
        transition: width 0.3s;
      }
      .progress-fill.done {
        background: #1f8b3a;
      }

      .progress-pct {
        text-align: right;
        color: #777;
        font-size: 11px;
        margin-top: 4px;
      }

      .log-container {
        margin-top: 12px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
        background: #1e1e1e;
      }
      .log-header {
        background: #2d2d2d;
        padding: 7px 12px;
        border-bottom: 1px solid #3d3d3d;
        font-size: 12px;
        font-weight: 600;
        color: #e0e0e0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .log-controls {
        display: flex;
        gap: 6px;
      }
      .log-controls button {
        height: 24px;
        padding: 0 10px;
        font-size: 10px;
        background: #3d3d3d;
        border: 1px solid #555;
        border-radius: 4px;
        cursor: pointer;
        color: #e0e0e0;
      }
      .log-controls button:hover {
        background: #4d4d4d;
      }

      .console-box {
        background: #1e1e1e;
        color: #f2f2f2;
        border-radius: 0;
        padding: 12px;
        min-height: 132px;
        max-height: 400px;
        overflow: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .done-banner {
        display: none;
        background: #e7f5e8;
        border: 1px solid #cfe7d1;
        color: #2e8b57;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 12px;
        font-weight: bold;
      }

      .results-panel {
        display: none;
      }

      .tabs {
        display: flex;
        gap: 6px;
        margin: 0 0 12px 0;
        flex-wrap: wrap;
      }
      .tab-btn {
        height: 32px;
        padding: 0 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #f7f7f7;
        cursor: pointer;
        font-size: 12px;
      }
      .tab-btn.active {
        background: #185fa5;
        color: #fff;
        border-color: #185fa5;
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }

      /* FileMaker 17/18 Windows Web Viewer uses the IE engine.
         Avoid CSS grid here; use inline-block tiles so results render correctly. */
      .metric-grid {
        margin-top: 10px;
        font-size: 0;
      }
      .metric {
        display: inline-block;
        vertical-align: top;
        width: 23%;
        min-width: 140px;
        margin: 0 1% 8px 0;
        background: #f5f5f5;
        border-radius: 8px;
        padding: 10px 12px;
        border: 1px solid #e0e0e0;
        font-size: 13px;
      }
      .metric-val {
        font-size: 18px;
        font-weight: bold;
        color: #185fa5;
        line-height: 1.2;
        margin-bottom: 4px;
      }
      .metric-lbl {
        font-size: 11px;
        color: #888;
      }

      .img-tool-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }
      .img-tab-btn {
        height: 28px;
        padding: 0 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #f7f7f7;
        cursor: pointer;
        font-size: 11px;
      }
      .img-tab-btn:hover {
        background: #eee;
      }
      .img-tab-btn.active {
        background: #185fa5;
        color: #fff;
        border-color: #185fa5;
      }
      .img-tab-panel {
        display: none;
      }
      .img-tab-panel.active {
        display: block;
      }
      .img-tab-panel img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="page-title">SSL Checker — Live Progress</div>

    <div class="panel" style="padding: 10px 18px; margin-bottom: 12px">
      <div class="scan-row">
        <span class="muted">Scanning on server:</span>
        <span class="server-pill" id="serverNameTag">—</span>
        <span class="muted" id="serverUrlTag" style="font-size: 11px"></span>
      </div>
    </div>

    <div class="panel">
      <div class="scan-row">
        <span class="muted">Scanning:</span>
        <span class="domain-pill" id="domainTag"></span>
        <span class="status-pill" id="scanStatusBadge">Starting...</span>
      </div>
    </div>

    <div class="panel" id="progressPanel">
      <div class="section-title">Live progress</div>
      <div class="status-text" id="statusText">Waiting...</div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-pct" id="pctText">0%</div>
      </div>

      <div class="log-container">
        <div class="log-header">
          <span>📋 Console log</span>
          <div class="log-controls">
            <button onclick="clearLog()">Clear</button>
            <button onclick="copyLog(event)">Copy</button>
            <button onclick="toggleAutoScroll(event)">Auto-scroll: ON</button>
          </div>
        </div>
        <div class="console-box" id="logBox">(waiting for output...)</div>
      </div>
    </div>

    <div class="done-banner" id="doneNotice">
      <span>&#10004;</span> Scan complete!
    </div>

    <div class="panel results-panel" id="resultCard">
      <div class="section-title">Results</div>
      <div class="tabs">
        <button
          type="button"
          class="tab-btn active"
          onclick="showTab('tabSummary', this)"
        >
          Summary
        </button>
        <button
          type="button"
          class="tab-btn"
          onclick="showTab('tabScreenshots', this)"
        >
          Screenshots
        </button>
        <button
          type="button"
          class="tab-btn"
          onclick="showTab('tabJson', this)"
        >
          JSON
        </button>
      </div>

      <div id="tabSummary" class="tab-panel active">
        <div class="metric-grid" id="metricGrid"></div>
      </div>

      <div id="tabScreenshots" class="tab-panel">
        <div class="img-tool-tabs" id="imgToolTabs"></div>
        <div id="imgToolPanels"></div>
      </div>

      <div id="tabJson" class="tab-panel">
        <pre
          id="resultBox"
          style="max-height: 300px; overflow: auto; font-size: 11px"
        ></pre>
      </div>
    </div>

    <script>
      (function () {
        var AUTO_DOMAIN = getParam("domain");
        var API_BASE = window.location.protocol + "//" + window.location.host;
        var pollTimer = null;
        var autoScroll = true;
        var scanIsDone = false;
        var resultRendered = false;
        var JOB_ID = getParam("job_id");

        function byId(id) {
          return document.getElementById(id);
        }

        function getParam(name) {
          var qs = window.location.search.substring(1);
          var parts = qs.split("&");
          for (var i = 0; i < parts.length; i++) {
            var pair = parts[i].split("=");
            if (decodeURIComponent(pair[0]) === name)
              return decodeURIComponent((pair[1] || "").replace(/\+/g, " "));
          }
          return "";
        }

        function escapeHtml(str) {
          if (str == null) return "";
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        function setText(id, val) {
          byId(id).innerHTML = escapeHtml(val);
        }

        function clearLog() {
          byId("logBox").textContent = "(log cleared)";
        }

        function copyLog(ev) {
          var btn = ev && ev.target ? ev.target : null;
          var text = byId("logBox").textContent;
          var copied = false;
          // navigator.clipboard not available in FM 18 (IE engine) — use execCommand
          try {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.top = "0";
            ta.style.left = "0";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            copied = document.execCommand("copy");
            document.body.removeChild(ta);
          } catch (e) { copied = false; }
          if (btn) {
            var orig = btn.textContent;
            btn.textContent = copied ? "Copied!" : "Copy failed";
            setTimeout(function () { btn.textContent = orig; }, 1500);
          }
        }

        function toggleAutoScroll(ev) {
          autoScroll = !autoScroll;
          ev.target.textContent = autoScroll
            ? "Auto-scroll: ON"
            : "Auto-scroll: OFF";
        }

        function showTab(tabId, btn) {
          // NodeList.forEach not supported in IE — use a regular for loop
          var panels = document.querySelectorAll(".tab-panel");
          var btns   = document.querySelectorAll(".tab-btn");
          for (var i = 0; i < panels.length; i++) panels[i].className = panels[i].className.replace(/\bactive\b/, "").trim();
          for (var j = 0; j < btns.length; j++)   btns[j].className   = btns[j].className.replace(/\bactive\b/, "").trim();
          byId(tabId).className += " active";
          btn.className += " active";
        }
        window.showTab = showTab;

        function showImgTab(key, btn) {
          // NodeList.forEach not supported in IE — use a regular for loop
          var tabBtns = document.querySelectorAll(".img-tab-btn");
          var tabPnls = document.querySelectorAll(".img-tab-panel");
          for (var i = 0; i < tabBtns.length; i++) tabBtns[i].className = tabBtns[i].className.replace(/\bactive\b/, "").trim();
          for (var j = 0; j < tabPnls.length; j++) tabPnls[j].className = tabPnls[j].className.replace(/\bactive\b/, "").trim();
          btn.className += " active";
          var panel = byId("imgPanel_" + key);
          if (panel) panel.className += " active";
        }
        window.showImgTab = showImgTab;

        function getServerName() {
          var p = getParam("server_name");
          return p ? String(p).trim().replace(/%20/g, " ") : "";
        }

        function setBadgeState(text) {
          byId("scanStatusBadge").innerHTML = escapeHtml(text);
        }

        function markScanCompleteState() {
          scanIsDone = true;
          setBadgeState("Done");
          byId("progressFill").style.width = "100%";
          byId("progressFill").className = "progress-fill done";
          setText("pctText", "100%");
          setText("statusText", "Scan complete!");
          byId("doneNotice").style.display = "block";
        }

        function xhrGetJson(url, okFn, errFn) {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", url, true);
          xhr.timeout = 10000; // IE can hang without a timeout
          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status >= 200 && xhr.status < 300) {
                try {
                  okFn(JSON.parse(xhr.responseText));
                } catch (e) {
                  if (errFn) errFn(e);
                }
              } else {
                if (errFn) errFn(xhr.status);
              }
            }
          };
          xhr.ontimeout = function () { if (errFn) errFn("timeout"); };
          xhr.onerror   = function () { if (errFn) errFn("error"); };
          xhr.send(null);
        }

        function xhrGetText(url, okFn, errFn) {
          var xhr = new XMLHttpRequest();
          xhr.open("GET", url, true);
          xhr.timeout = 10000;
          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status >= 200 && xhr.status < 300) okFn(xhr.responseText);
              else if (errFn) errFn(xhr.status);
            }
          };
          xhr.ontimeout = function () { if (errFn) errFn("timeout"); };
          xhr.onerror   = function () { if (errFn) errFn("error"); };
          xhr.send(null);
        }

        function renderImages(d) {
          var cards = [
            { key: "ssl", label: "SSL Lab", url: d.SSL_Screenshot },
            { key: "sucuri", label: "Sucuri", url: d.Sucuri_Screenshot },
            {
              key: "pagespeed",
              label: "PageSpeed",
              url: d.PageSpeed_Screenshot,
            },
            { key: "pingdom", label: "Pingdom", url: d.Pingdom_Screenshot },
            { key: "dns", label: "DNS", url: d.DNS_Screenshot },
            { key: "pagerank", label: "PageRank", url: d.PageRank_Screenshot },
            { key: "server", label: "Server", url: d.Server_Screenshot },
            { key: "intodns", label: "IntoDNS", url: d.IntoDNS_Screenshot },
            {
              key: "indepthdns",
              label: "INDepthDNS",
              url: d.InDepthDNS_Screenshot,
            },
          ].filter(function (x) {
            return x.url && x.url !== "none" && x.url !== "";
          });

          var tabBar = byId("imgToolTabs");
          var panelBox = byId("imgToolPanels");

          if (!cards.length) {
            tabBar.innerHTML = "";
            panelBox.innerHTML =
              '<div style="font-size:12px;color:#888;padding:8px 0">No screenshots available.</div>';
            return;
          }

          tabBar.innerHTML = cards
            .map(function (c, i) {
              return (
                '<button type="button" class="img-tab-btn' +
                (i === 0 ? " active" : "") +
                '" onclick="showImgTab(\'' +
                c.key +
                "',this)\">" +
                c.label +
                "</button>"
              );
            })
            .join("");

          panelBox.innerHTML = cards
            .map(function (c, i) {
              return (
                '<div id="imgPanel_' +
                c.key +
                '" class="img-tab-panel' +
                (i === 0 ? " active" : "") +
                '">' +
                '<a href="' +
                escapeHtml(c.url) +
                '" target="_blank">' +
                '<img src="' +
                escapeHtml(c.url) +
                '" alt="' +
                c.label +
                '" loading="lazy">' +
                "</a>" +
                '<div style="font-size:11px;color:#888;text-align:right;margin-top:6px">Click image to open full size ↗</div>' +
                "</div>"
              );
            })
            .join("");
        }

        function renderResult(d) {
          resultRendered = true;

          byId("metricGrid").innerHTML =
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.SSL_Grade || "N/A") +
            '</div><div class="metric-lbl">SSL Grade</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.Sucuri_Overall || d.Sucuri_Result || "N/A") +
            '</div><div class="metric-lbl">Sucuri</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.PageSpeed_Performance || "N/A") +
            '</div><div class="metric-lbl">PageSpeed</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.Pingdom_Grade || "N/A") +
            '</div><div class="metric-lbl">Pingdom</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.DNS_PropagationRate || d.DNS_Propagation || "N/A") +
            '</div><div class="metric-lbl">DNS</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.PageRank_Integer || "N/A") +
            '</div><div class="metric-lbl">PageRank</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.Server_IP_Address || d.Server_IP || "N/A") +
            '</div><div class="metric-lbl">Server IP</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.IntoDNS_OverallHealth || d.IntoDNS_Health || "N/A") +
            '</div><div class="metric-lbl">IntoDNS</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(d.InDepthDNS_OverallHealth || d.InDepthDNS_Status || "N/A") +
            '</div><div class="metric-lbl">INDepthDNS</div></div>' +
            '<div class="metric"><div class="metric-val">' +
            escapeHtml(
              (d.InDepthDNS_Pass || "0") +
                " / " +
                (d.InDepthDNS_Warn || "0") +
                " / " +
                (d.InDepthDNS_Fail || "0")
            ) +
            '</div><div class="metric-lbl">INDepthDNS Pass / Warn / Fail</div></div>';

          renderImages(d);
          byId("resultBox").textContent = JSON.stringify(d, null, 2);

          markScanCompleteState();
          byId("progressPanel").style.display = "none";
          byId("resultCard").style.display = "block";
          if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }

        function fetchResultIfAvailable(domain, okFn, notReadyFn) {
          xhrGetJson(
            API_BASE + "/result?domain=" + encodeURIComponent(domain),
            function (j) {
              if (j && j.ok && j.data) {
                renderResult(j.data);
                if (okFn) okFn(j.data);
              } else {
                if (notReadyFn) notReadyFn();
              }
            },
            function () {
              if (notReadyFn) notReadyFn();
            }
          );
        }

        function pollStatus(domain) {
          if (!JOB_ID) {
            fetchResultIfAvailable(
              domain,
              function () {},
              function () {
                setText("statusText", "Missing job_id parameter");
              }
            );
            return;
          }

          xhrGetJson(
            API_BASE + "/progress?job_id=" + encodeURIComponent(JOB_ID),
            function (j) {
              var p = j && j.progress ? j.progress : {};
              var completed = parseInt(p.completed || "0", 10);
              var total = parseInt(p.total || "1", 10) || 1;
              var pct = Math.round((completed / total) * 100);
              var status = p.status || "";

              byId("progressFill").style.width = pct + "%";
              setText("pctText", pct + "%");
              setText("statusText", status || "Running...");
              if (!scanIsDone) setBadgeState("Scanning...");

              var isDone = status.toUpperCase().indexOf("DONE") === 0;
              if (isDone && !scanIsDone) {
                if (pollTimer) {
                  clearInterval(pollTimer);
                  pollTimer = null;
                }
                fetchResultIfAvailable(domain, function () {});
              }
            },
            function () {
              fetchResultIfAvailable(
                domain,
                function () {},
                function () {
                  setText("statusText", "Cannot reach server...");
                }
              );
            }
          );

          xhrGetText(
            API_BASE + "/log?job_id=" + encodeURIComponent(JOB_ID),
            function (text) {
              var lines = text.split("\n");
              if (lines.length > 50) lines = lines.slice(lines.length - 50);
              var logBox = byId("logBox");
              logBox.textContent =
                lines.join("\n") || "(waiting for output...)";
              if (autoScroll) logBox.scrollTop = logBox.scrollHeight;
            }
          );
        }

        function startPolling(domain) {
          if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
          }
          scanIsDone = false;
          resultRendered = false;
          setBadgeState("Scanning...");
          byId("progressPanel").style.display = "block";
          byId("doneNotice").style.display = "none";
          byId("resultCard").style.display = "none";
          byId("progressFill").className = "progress-fill";
          byId("progressFill").style.width = "0%";
          setText("pctText", "0%");
          setText("statusText", "Loading scan status...");
          byId("logBox").textContent = "(waiting for output...)";
          pollStatus(domain);
          pollTimer = setInterval(function () {
            pollStatus(domain);
          }, 5000);
        }

        function decideInitialView(domain) {
          // ?view=result mode: skip polling, just show stored result
          var viewMode = getParam("view");
          if (viewMode === "result") {
            byId("progressPanel").style.display = "none";
            byId("doneNotice").style.display = "none";
            setText("statusText", "Loading result...");
            fetchResultIfAvailable(
              domain,
              function () { setBadgeState("Done"); },
              function () {
                byId("progressPanel").style.display = "block";
                setText("statusText", "No result found for this domain yet.");
                setBadgeState("No result");
              }
            );
            return;
          }

          // FM 18 compatible: skip the /status pre-check entirely.
          // If we have a job_id, start polling immediately — the /progress
          // endpoint will return the live state. When the scan finishes,
          // pollStatus detects DONE and calls fetchResultIfAvailable.
          // If no job_id, try fetching the stored result right away.
          if (JOB_ID) {
            startPolling(domain);
          } else {
            fetchResultIfAvailable(
              domain,
              function () { setBadgeState("Done"); },
              function () {
                setBadgeState("Scanning...");
                startPolling(domain);
              }
            );
          }
        }

        window.clearLog = clearLog;
        window.copyLog = copyLog;
        window.toggleAutoScroll = toggleAutoScroll;

        window.onload = function () {
          setText("serverNameTag", getServerName());
          setText("serverUrlTag", API_BASE);

          if (!AUTO_DOMAIN) {
            setText("domainTag", "No domain supplied");
            setText("statusText", "Missing ?domain= parameter");
            return;
          }

          setText("domainTag", AUTO_DOMAIN);
          decideInitialView(AUTO_DOMAIN);
        };
      })();
    </script>
  </body>
</html>
