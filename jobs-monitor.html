<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SSL Checker — Jobs Monitor</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 14px;
        background: #f3f3f3;
        color: #222;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
      }

      .page-title {
        font-size: 16px;
        font-weight: bold;
        margin: 0 0 10px 0;
      }

      .panel {
        background: #fff;
        border: 1px solid #d8d8d8;
        border-radius: 10px;
        padding: 14px 18px;
        margin-bottom: 12px;
      }

      .top-bar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: space-between;
      }

      .top-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .server-pill {
        display: inline-block;
        padding: 3px 12px;
        background: #f0faf4;
        color: #1f8b3a;
        border-radius: 14px;
        font-weight: bold;
      }

      .muted {
        color: #666;
        font-size: 12px;
      }

      .btn {
        height: 28px;
        padding: 0 14px;
        border-radius: 7px;
        border: 1px solid #ccc;
        background: #f7f7f7;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }

      .btn:hover { background: #eee; }

      .btn-blue {
        background: #185fa5;
        color: #fff;
        border-color: #185fa5;
      }

      .btn-blue:hover { background: #1470b8; }

      .btn-red {
        background: #dc3545;
        color: #fff;
        border-color: #dc3545;
      }

      .btn-red:hover { background: #c02737; }

      .stats-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .stat-box {
        background: #f8f9fc;
        padding: 10px 16px;
        border-radius: 10px;
        text-align: center;
        flex: 1;
        min-width: 80px;
        border: 1px solid #e5e5e5;
      }

      .stat-number {
        font-size: 22px;
        font-weight: bold;
        color: #185fa5;
      }

      .stat-label {
        font-size: 11px;
        color: #777;
        margin-top: 2px;
      }

      .refresh-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #28a745;
        margin-right: 5px;
        vertical-align: middle;
      }

      .last-updated {
        font-size: 11px;
        color: #888;
      }

      .jobs-wrap {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .server-block {
        border: 1px solid #e3e3e3;
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }

      .server-header {
        background: #f4f8f5;
        border-bottom: 1px solid #e3e3e3;
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .server-title {
        font-size: 14px;
        font-weight: 700;
        color: #1f8b3a;
      }

      .server-meta {
        font-size: 11px;
        color: #777;
      }

      .server-jobs {
        display: flex;
        flex-direction: column;
      }

      .job-row {
        padding: 10px 14px;
        border-bottom: 1px solid #f0f0f0;
        transition: opacity 1.5s ease;
      }

      .job-row:last-child {
        border-bottom: none;
      }

      .job-main {
        /* Single-column job layout for FileMaker 17 Web Viewer.
           This prevents the Started/ID block from being squeezed into
           the right side and overlapping the progress/table area. */
        display: block;
        width: 100%;
      }

      .job-main > div {
        min-width: 0;
        width: 100%;
      }

      .job-content {
        width: 100%;
      }

      .job-main .pb-wrap {
        width: 100%;
        margin-top: 8px;
      }

      .job-meta-inline {
        display: inline-block;
        font-size: 11px;
        color: #777;
        line-height: 1.4;
        white-space: nowrap;
        margin-left: 12px;
      }

      .job-meta-inline span {
        display: inline-block;
        margin-right: 14px;
      }

      .job-meta-inline code {
        font-size: 10px;
        color: #555;
      }

      .job-domain {
        display: block;
        width: 100%;
        line-height: 1.8;
        white-space: normal;
      }

      .job-domain > span {
        vertical-align: middle;
        margin-right: 10px;
        margin-bottom: 3px;
      }

      .job-row-spacer {
        display: inline-block;
        width: 10px;
      }

      .domain-text {
        display: inline-block;
        font-weight: 600;
        color: #185fa5;
        word-break: break-word;
        margin-right: 12px;
      }

      .type-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 700;
        margin-right: 8px;
      }

      .type-single {
        background: #fff3cd;
        color: #856404;
      }

      .type-multi {
        background: #e2d9f3;
        color: #5a2d91;
      }

      .status-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 700;
        white-space: nowrap;
        margin-left: 4px;
        margin-right: 14px;
      }

      .status-running {
        background: #185fa5;
        color: #fff;
      }

      .status-done {
        background: #28a745;
        color: #fff;
      }

      .status-idle {
        background: #6c757d;
        color: #fff;
      }

      .pb-wrap {
        min-width: 120px;
      }

      .pb-track {
        width: 100%;
        height: 7px;
        background: #e0e0e0;
        border-radius: 20px;
        overflow: hidden;
        margin-bottom: 3px;
      }

      .pb-fill {
        height: 7px;
        background: #1f78d1;
        border-radius: 20px;
        transition: width 0.3s ease;
      }

      .pb-fill.done {
        background: #28a745;
      }

      .pb-fill.indeterminate {
        width: 100% !important;
        background: repeating-linear-gradient(
          45deg,
          #1f78d1,
          #1f78d1 10px,
          #4a90e2 10px,
          #4a90e2 20px
        );
        background-size: 200% 100%;
        animation: progress-bar-stripes 1s linear infinite;
      }

      @keyframes progress-bar-stripes {
        from { background-position: 0 0; }
        to { background-position: 40px 0; }
      }

      .pb-text {
        font-size: 10px;
        color: #777;
      }

      .job-meta {
        font-size: 11px;
        color: #777;
        line-height: 1.4;
      }

      .job-actions {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .view-link {
        font-size: 11px;
        color: #185fa5;
        text-decoration: none;
      }

      .view-link:hover {
        text-decoration: underline;
      }

      .tools-line {
        margin-top: 6px;
        font-size: 11px;
        color: #666;
      }

      .log-row {
        display: none;
        margin-top: 8px;
      }

      .log-box {
        background: #1e1e1e;
        color: #d4d4d4;
        border-radius: 6px;
        padding: 10px;
        min-height: 80px;
        max-height: 220px;
        overflow: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: Consolas, "Courier New", monospace;
        font-size: 11px;
        line-height: 1.45;
      }

      .empty-state {
        text-align: center;
        padding: 40px;
        color: #aaa;
      }

      .domain-rows {
        margin-top: 8px;
        border-top: 1px solid #f0f0f0;
        padding-top: 6px;
        max-height: 420px;
        overflow-y: auto;
        overflow-x: auto;
        width: 100%;
      }

      /* FileMaker 17 Web Viewer is safer with a real table than CSS grid. */
      .domain-table {
        width: 100%;
        min-width: 560px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .domain-table th {
        padding: 4px 6px 6px 6px;
        border-bottom: 1px solid #f3f3f3;
        color: #666;
        font-size: 11px;
        font-weight: 700;
        text-align: left;
        white-space: nowrap;
      }

      .domain-table td {
        padding: 5px 6px;
        vertical-align: middle;
        border: none;
        line-height: 1.35;
      }

      .domain-col-domain { width: 54%; }
      .domain-col-time   { width: 24%; }
      .domain-col-status { width: 22%; }

      .domain-name-cell {
        display: block;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
      }

      .domain-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 7px;
        vertical-align: middle;
        transition: background 0.3s ease;
      }

      .domain-row-name {
        display: inline-block;
        max-width: calc(100% - 20px);
        font-size: 12px;
        color: #333;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        vertical-align: middle;
      }

      .domain-row-status {
        font-size: 11px;
        color: #888;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .domain-row-time {
        font-size: 11px;
        color: #777;
        text-align: left;
        white-space: nowrap;
      }

      .domain-row-item.is-done .domain-row-name,
      .domain-row-item.is-done .domain-row-status,
      .domain-row-item.is-done .domain-row-time { color: #1a6e31; }
      .domain-row-item.is-failed .domain-row-name,
      .domain-row-item.is-failed .domain-row-status,
      .domain-row-item.is-failed .domain-row-time { color: #b02030; }
      .domain-row-item.is-running .domain-row-name,
      .domain-row-item.is-running .domain-row-status,
      .domain-row-item.is-running .domain-row-time { color: #185fa5; font-weight: 600; }

      @media (max-width: 980px) {
        .job-main {
          display: block;
        }
        .job-actions {
          justify-content: flex-start;
        }
      }

      @media (max-width: 620px) {
        body {
          padding: 8px;
          font-size: 12px;
        }
        .panel {
          padding: 10px;
        }
        .job-row {
          padding: 8px 10px;
        }
        .server-header {
          padding: 8px 10px;
        }
        .domain-col-domain { width: 50%; }
        .domain-col-time   { width: 27%; }
        .domain-col-status { width: 23%; }
        .domain-table th,
        .domain-table td {
          padding-left: 2px;
          padding-right: 2px;
        }
        .domain-table th,
        .domain-row-status,
        .domain-row-time {
          font-size: 10px;
        }
        .domain-row-name {
          font-size: 11px;
        }
        .stat-box {
          min-width: 95px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-title">🖥️ Jobs Monitor</div>

    <div class="panel" style="padding:10px 18px; margin-bottom:12px;">
      <div class="top-bar">
        <div class="top-left">
          <span class="muted">Servers:</span>
          <span id="serverPills"></span>
          <span id="refreshIndicator" style="margin-left:6px; font-size:11px; color:#666;">
            <span class="refresh-dot"></span>Live
          </span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="last-updated muted" id="lastUpdated"></span>
          <button class="btn btn-blue" onclick="refreshAll()">↺ Refresh Now</button>
        </div>
      </div>
    </div>

    <div class="panel" id="statsPanel">
      <div class="stats-row">
        <div class="stat-box"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Total Jobs</div></div>
        <div class="stat-box"><div class="stat-number" id="statSingle" style="color:#856404;">0</div><div class="stat-label">Single</div></div>
        <div class="stat-box"><div class="stat-number" id="statMulti" style="color:#5a2d91;">0</div><div class="stat-label">Multi-Batch</div></div>
        <div class="stat-box"><div class="stat-number" id="statDomains">0</div><div class="stat-label">Domains Active</div></div>
        <div class="stat-box"><div class="stat-number" id="statScanned">0/0</div><div class="stat-label">Domains Scanned</div></div>
      </div>
    </div>

    <div class="panel" id="jobsPanel">
      <div class="section-title" style="font-size:14px;font-weight:bold;margin:0 0 10px 0;">Active Jobs by Server</div>
      <div id="jobsGroupedWrap">
        <div class="empty-state">No scanning is ongoing.</div>
      </div>
    </div>

    <script>
    (function() {
      var ACTIVE_REFRESH_MS = 2500;
      var IDLE_REFRESH_MS = 10000;
      var EMPTY_CLEAR_DELAY_MS = 1200;
      var refreshTimer = null;
      var emptyClearTimer = null;
      var allJobs = [];
      var openLogs = {};
      var fetchedServers = {};
      var pendingFetches = 0;
      var doneKeys = {};       // tracks job keys already marked done
      var lastJobKeys = null;  // tracks previous job key set for smart re-render
      var domainScanByKey = {}; // jobKey => { done: scanned domains, total: total domains }
      var domainProcessTimeByKey = {}; // jobKey::domain => { startedMs, endedMs }

      function byId(id) {
        return document.getElementById(id);
      }

      function getParam(name) {
        var qs = window.location.search.substring(1);
        var parts = qs.split("&");
        for (var i = 0; i < parts.length; i++) {
          var pair = parts[i].split("=");
          if (decodeURIComponent(pair[0] || "") === name) {
            return decodeURIComponent((pair[1] || "").replace(/\+/g, " "));
          }
        }
        return "";
      }

      function parseServers() {
        var raw = getParam("servers");
        if (raw) {
          var arr = raw.split(",");
          var out = [];
          for (var i = 0; i < arr.length; i++) {
            var s = arr[i];
            var parts = s.split("|");
            var base = (parts[1] || parts[0] || "");
            if (base.charAt(base.length - 1) === "/") {
              base = base.substring(0, base.length - 1);
            }
            if (base) {
              out.push({
                name: parts[0] || s,
                base: base
              });
            }
          }
          return out;
        }

        var host = getParam("host") || getParam("server_host") || window.location.hostname;
        var port = getParam("port") || "3000";
        var name = getParam("server_name") || host;

        return [{
          name: name,
          base: "http://" + host + ":" + port
        }];
      }

      var SERVERS = parseServers();

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function elapsed(startedAt) {
        if (!startedAt) return "—";
        var d = new Date(startedAt);
        var t = d.getTime();
        if (isNaN(t)) return "—";
        var diff = Math.floor((new Date().getTime() - t) / 1000);
        if (diff < 0) return "—";
        if (diff < 60) return diff + "s";
        if (diff < 3600) return Math.floor(diff / 60) + "m " + (diff % 60) + "s";
        return Math.floor(diff / 3600) + "h " + Math.floor((diff % 3600) / 60) + "m";
      }

      function formatDurationMs(ms) {
        ms = Math.max(0, parseInt(ms || 0, 10));
        var totalSeconds = Math.floor(ms / 1000);
        if (totalSeconds < 60) return totalSeconds + "s";
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        if (minutes < 60) return minutes + "m " + seconds + "s";
        var hours = Math.floor(minutes / 60);
        minutes = minutes % 60;
        return hours + "h " + minutes + "m";
      }

      function normalizeDomainStatus(status) {
        var label = String(status || "queued").toLowerCase();
        if (label === "processing" || label === "checking" || label === "running" || label === "scanning") return "scanning";
        if (label === "done" || label === "complete" || label === "completed") return "done";
        if (label === "failed" || label === "error") return "failed";
        return "queued";
      }

      function processTimeKey(jobKeyValue, domain) {
        return String(jobKeyValue || "") + "::" + String(domain || "");
      }

      function numericProcessMs(item) {
        if (!item) return null;
        var keys = ["process_time_ms", "processMs", "duration_ms", "durationMs", "elapsed_ms", "elapsedMs"];
        for (var i = 0; i < keys.length; i++) {
          if (typeof item[keys[i]] !== "undefined" && item[keys[i]] !== null && item[keys[i]] !== "") {
            var n = parseInt(item[keys[i]], 10);
            if (!isNaN(n)) return n;
          }
        }
        return null;
      }

      function textProcessTime(item) {
        if (!item) return "";
        var keys = ["process_time", "processTime", "duration", "elapsed"];
        for (var i = 0; i < keys.length; i++) {
          if (typeof item[keys[i]] !== "undefined" && item[keys[i]] !== null && item[keys[i]] !== "") {
            return String(item[keys[i]]);
          }
        }
        return "";
      }

      function firstDateMs(item, keys) {
        if (!item) return null;
        for (var i = 0; i < keys.length; i++) {
          if (item[keys[i]]) {
            var t = new Date(item[keys[i]]).getTime();
            if (!isNaN(t)) return t;
          }
        }
        return null;
      }

      function deleteDomainProcessTimesForJob(key) {
        var prefix = String(key || "") + "::";
        for (var k in domainProcessTimeByKey) {
          if (domainProcessTimeByKey.hasOwnProperty(k) && k.indexOf(prefix) === 0) {
            delete domainProcessTimeByKey[k];
          }
        }
      }

      function updateDomainProcessTime(rowEl, status, statusItem) {
        if (!rowEl) return;
        var timeEl = rowEl.querySelector(".domain-row-time");
        if (!timeEl) return;

        var normalized = normalizeDomainStatus(status);
        var key = rowEl.getAttribute("data-time-key") || "";
        var now = new Date().getTime();
        var rec = domainProcessTimeByKey[key] || {};
        var apiMs = numericProcessMs(statusItem);
        var apiText = textProcessTime(statusItem);
        var apiStarted = firstDateMs(statusItem, ["started_at", "startedAt", "scan_started_at", "scanStartedAt"]);
        var apiFinished = firstDateMs(statusItem, ["finished_at", "finishedAt", "scan_finished_at", "scanFinishedAt"]);

        if (apiStarted !== null) rec.startedMs = apiStarted;
        if (apiFinished !== null) rec.endedMs = apiFinished;

        if (normalized === "scanning") {
          if (!rec.startedMs) rec.startedMs = now;
          rec.endedMs = null;
          if (apiMs !== null) {
            timeEl.textContent = formatDurationMs(apiMs);
          } else if (apiText) {
            timeEl.textContent = apiText;
          } else {
            timeEl.textContent = formatDurationMs(now - rec.startedMs);
          }
        } else if (normalized === "done" || normalized === "failed") {
          if (apiMs !== null) {
            timeEl.textContent = formatDurationMs(apiMs);
          } else if (apiText) {
            timeEl.textContent = apiText;
          } else if (rec.startedMs) {
            if (!rec.endedMs) rec.endedMs = now;
            timeEl.textContent = formatDurationMs(rec.endedMs - rec.startedMs);
          } else {
            timeEl.textContent = "—";
          }
        } else {
          timeEl.textContent = "—";
        }

        domainProcessTimeByKey[key] = rec;
      }

      function jobKey(j) {
        return (j._server || "") + ":" + (j.batchId || j.jobId || j.key || j.domain || "");
      }

      function domainListForJob(j) {
        if (j && j.domain_statuses && j.domain_statuses.length) {
          var out = [];
          for (var i = 0; i < j.domain_statuses.length; i++) out.push(j.domain_statuses[i].domain);
          return out;
        }
        return (j && j.domains && j.domains.length) ? j.domains : [];
      }

      function domainStatusMap(items) {
        var map = {};
        items = items || [];
        for (var i = 0; i < items.length; i++) {
          if (items[i] && items[i].domain) map[items[i].domain] = items[i].status || "queued";
        }
        return map;
      }

      function domainStatusItemMap(items) {
        var map = {};
        items = items || [];
        for (var i = 0; i < items.length; i++) {
          if (items[i] && items[i].domain) map[items[i].domain] = items[i];
        }
        return map;
      }

      function toInt(v, fallback) {
        var n = parseInt(v, 10);
        return isNaN(n) ? (fallback || 0) : n;
      }

      function getDomainScanCounts(j) {
        var key = jobKey(j);
        if (domainScanByKey[key]) {
          return domainScanByKey[key];
        }

        var done = 0;
        var total = 0;

        if (j.type === "multi") {
          var dl = domainListForJob(j);
          total = (dl && dl.length) ? dl.length : toInt(j.domain_count || j.total_domains || j.total, 0);

          if (typeof j.done_count !== "undefined") {
            done = toInt(j.done_count, 0);
          } else if (j.domain_statuses && j.domain_statuses.length) {
            for (var i = 0; i < j.domain_statuses.length; i++) {
              if (j.domain_statuses[i] && j.domain_statuses[i].status === "done") done++;
            }
          }
        } else if (j.type === "single") {
          total = 1;
          done = 0;
        }

        if (done > total) total = done;
        return { done: done, total: total };
      }

      function rememberDomainScanCounts(key, done, total) {
        done = toInt(done, 0);
        total = toInt(total, 0);
        if (done > total) total = done;
        domainScanByKey[key] = { done: done, total: total };
      }

      function applyDomainStatusToRow(rowEl, status, statusItem) {
        if (!rowEl) return;
        var dotEl = rowEl.querySelector(".domain-dot");
        var statusEl = rowEl.querySelector(".domain-row-status");
        var cssClass = "";
        var dotColor = "#ccc";
        var label = normalizeDomainStatus(status);

        if (label === "done") {
          cssClass = "is-done";
          dotColor = "#28a745";
        } else if (label === "failed") {
          cssClass = "is-failed";
          dotColor = "#dc3545";
        } else if (label === "scanning") {
          cssClass = "is-running";
          dotColor = "#185fa5";
        } else {
          label = "queued";
        }

        rowEl.className = "domain-row-item " + cssClass;
        if (dotEl) dotEl.style.background = dotColor;
        if (statusEl) statusEl.textContent = label;
        updateDomainProcessTime(rowEl, label, statusItem || null);
      }

      function xhrGetJson(url, okFn, errFn) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.timeout = 8000;
        xhr.onreadystatechange = function() {
          if (xhr.readyState !== 4) return;
          try {
            if (xhr.status >= 200 && xhr.status < 300) {
              okFn(JSON.parse(xhr.responseText));
            } else {
              if (errFn) errFn(xhr.status);
            }
          } catch (e) {
            if (errFn) errFn(e);
          }
        };
        xhr.ontimeout = function() {
          if (errFn) errFn("timeout");
        };
        xhr.send(null);
      }

      function xhrGetText(url, okFn) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.timeout = 8000;
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4 && xhr.status === 200) okFn(xhr.responseText);
        };
        xhr.send(null);
      }

      function xhrPost(url, body, done) {
        var xhr = new XMLHttpRequest();
        xhr.open("POST", url, true);
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.timeout = 10000;
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            try {
              done(JSON.parse(xhr.responseText));
            } catch (e) {
              done(null);
            }
          }
        };
        xhr.send(JSON.stringify(body));
      }

      function renderServerPills() {
        var html = "";
        for (var i = 0; i < SERVERS.length; i++) {
          html += '<span class="server-pill">' + esc(fixSpaces(SERVERS[i].name)) + "</span>";
          html += '<span class="muted" style="font-size:11px; margin-right:8px;">' + esc(SERVERS[i].base) + "</span>";
        }
        byId("serverPills").innerHTML = html;
      }

      function renderNoScanningState() {
        allJobs = [];
        doneKeys = {};
        lastJobKeys = null;
        byId("statTotal").innerHTML = "0";
        byId("statSingle").innerHTML = "0";
        byId("statMulti").innerHTML = "0";
        byId("statDomains").innerHTML = "0";
        byId("statScanned").innerHTML = "0/0";
        byId("jobsGroupedWrap").innerHTML = '<div class="empty-state">No scanning is ongoing.</div>';
        byId("lastUpdated").innerHTML = "Updated " + new Date().toLocaleTimeString();
        setAutoRefreshRate(IDLE_REFRESH_MS, "Idle");
      }

      function fetchAllServers() {
        pendingFetches = SERVERS.length;
        fetchedServers = {};

        if (!SERVERS.length) {
          renderNoScanningState();
          return;
        }

        for (var i = 0; i < SERVERS.length; i++) {
          (function(srv) {
            xhrGetJson(srv.base + "/jobs", function(data) {
              fetchedServers[srv.name] = { ok: true, data: data, server: srv };
              pendingFetches--;
              if (pendingFetches <= 0) mergeAndRender();
            }, function() {
              fetchedServers[srv.name] = { ok: false, server: srv };
              pendingFetches--;
              if (pendingFetches <= 0) mergeAndRender();
            });
          })(SERVERS[i]);
        }
      }

      function setAutoRefreshRate(ms, label) {
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(function() {
          fetchAllServers();
        }, ms);

        var indicator = byId("refreshIndicator");
        if (indicator) {
          indicator.innerHTML = '<span class="refresh-dot"></span>' + label + " (" + (ms / 1000) + "s)";
        }
      }

      function getVisibleJobRowCount() {
        return document.querySelectorAll(".job-row[id^='row-']").length;
      }

      function mergeAndRender() {
        var merged = [];
        var okCount = 0;

        for (var i = 0; i < SERVERS.length; i++) {
          var srv = SERVERS[i];
          var res = fetchedServers[srv.name];
          if (!res || !res.ok) continue;

          okCount++;
          var jobs = (res.data && res.data.jobs) ? res.data.jobs : [];
          for (var j = 0; j < jobs.length; j++) {
            var copy = {};
            for (var k in jobs[j]) {
              if (jobs[j].hasOwnProperty(k)) copy[k] = jobs[j][k];
            }
            copy._server = srv.name;
            copy._serverBase = srv.base;
            copy._reserved = res.data.reserved_domains;
            copy._max = res.data.max_reserved_domains;
            merged.push(copy);
          }
        }

        merged = merged.filter(function(j) { return !doneKeys[jobKey(j)]; });

        var activeKeyMap = {};
        for (var ak = 0; ak < merged.length; ak++) activeKeyMap[jobKey(merged[ak])] = true;
        for (var storedKey in domainScanByKey) {
          if (domainScanByKey.hasOwnProperty(storedKey) && !activeKeyMap[storedKey] && !doneKeys[storedKey]) {
            delete domainScanByKey[storedKey];
            deleteDomainProcessTimesForJob(storedKey);
          }
        }

        if (okCount === 0) {
          byId("lastUpdated").innerHTML = "Updated " + new Date().toLocaleTimeString();
          return;
        }

        if (merged.length === 0) {
          if (emptyClearTimer) clearTimeout(emptyClearTimer);

          if (getVisibleJobRowCount() > 0) {
            emptyClearTimer = setTimeout(function() {
              renderNoScanningState();
            }, EMPTY_CLEAR_DELAY_MS);
          } else {
            renderNoScanningState();
          }

          byId("lastUpdated").innerHTML = "Updated " + new Date().toLocaleTimeString();
          return;
        }

        if (emptyClearTimer) {
          clearTimeout(emptyClearTimer);
          emptyClearTimer = null;
        }

        var newKeyStr = merged.map(function(j) {
          return jobKey(j) + ":" + domainListForJob(j).length + ":" + (j.done_count || 0) + ":" + (j.processing_count || 0);
        }).sort().join("|");

        allJobs = merged;
        updateStats();
        setAutoRefreshRate(ACTIVE_REFRESH_MS, "Live");

        if (newKeyStr !== lastJobKeys) {
          lastJobKeys = newKeyStr;
          renderGroupedServers();
        } else {
          for (var x = 0; x < allJobs.length; x++) {
            fetchProgress(allJobs[x]);
          }
        }

        byId("lastUpdated").innerHTML = "Updated " + new Date().toLocaleTimeString();
      }

      function updateStats() {
        var singles = 0;
        var multis = 0;
        var domainCount = 0;
        var scannedDone = 0;
        var scannedTotal = 0;

        for (var i = 0; i < allJobs.length; i++) {
          var j = allJobs[i];

          if (j.type === "single") {
            singles++;
            domainCount++;
          } else if (j.type === "multi") {
            multis++;
            var dl = domainListForJob(j);
            if (dl && dl.length) domainCount += dl.length;
            else if (j.domain_count) domainCount += parseInt(j.domain_count || "0", 10) || 0;
            else if (j.domain) domainCount++;
          }

          var scanCounts = getDomainScanCounts(j);
          scannedDone += scanCounts.done;
          scannedTotal += scanCounts.total;
        }

        byId("statTotal").innerHTML = allJobs.length;
        byId("statSingle").innerHTML = singles;
        byId("statMulti").innerHTML = multis;
        byId("statDomains").innerHTML = domainCount;
        byId("statScanned").innerHTML = scannedDone + "/" + scannedTotal;
      }

      function groupJobsByServer() {
        var grouped = {};
        for (var i = 0; i < SERVERS.length; i++) {
          grouped[SERVERS[i].name] = [];
        }
        for (var j = 0; j < allJobs.length; j++) {
          var job = allJobs[j];
          if (!grouped[job._server]) grouped[job._server] = [];
          grouped[job._server].push(job);
        }
        return grouped;
      }

      function renderGroupedServers() {
        var wrap = byId("jobsGroupedWrap");
        var grouped = groupJobsByServer();
        var anyJobs = false;
        var html = '<div class="jobs-wrap">';

        for (var i = 0; i < SERVERS.length; i++) {
          var srv = SERVERS[i];
          var jobs = grouped[srv.name] || [];
          if (jobs.length) anyJobs = true;

          html += '<div class="server-block">';
          html += '<div class="server-header">';
          html += '<div class="server-title">' + esc(fixSpaces(srv.name)) + '</div>';
          html += '<div class="server-meta">' + esc(srv.base) + ' • ' + jobs.length + ' job(s)</div>';
          html += '</div>';

          if (!jobs.length) {
            html += '<div class="job-row"><span class="muted">No scanning is ongoing.</span></div>';
          } else {
            html += '<div class="server-jobs">';
            for (var j = 0; j < jobs.length; j++) {
              html += renderJobRow(jobs[j]);
            }
            html += '</div>';
          }

          html += '</div>';
        }

        html += "</div>";

        if (!anyJobs) {
          wrap.innerHTML = '<div class="empty-state">No scanning is ongoing.</div>';
          return;
        }

        wrap.innerHTML = html;

        for (var x = 0; x < allJobs.length; x++) {
          fetchProgress(allJobs[x]);
        }
      }

      function renderJobRow(j) {
        var key = jobKey(j);
        var isMulti = j.type === "multi";
        var batchId = j.batchId || "";
        var jobId = j.jobId || "";
        var viewUrl = isMulti
          ? j._serverBase + "/tester-multi?batch_id=" + encodeURIComponent(batchId)
          : j._serverBase + "/tester?domain=" + encodeURIComponent(j.domain || "") + "&job_id=" + encodeURIComponent(jobId);

        var stopAttr = isMulti
          ? 'onclick="stopJob(\'multi\',\'' + esc(key) + '\',\'' + esc(batchId) + '\',\'' + esc(j._serverBase) + '\')"'
          : 'onclick="stopJob(\'single\',\'' + esc(key) + '\',\'' + esc(j.domain || "") + '\',\'' + esc(j._serverBase) + '\')"';

        var logAttr = 'onclick="toggleLog(\'' + esc(key) + '\',\'' + esc(isMulti ? batchId : jobId) + '\',\'' + esc(j._serverBase) + '\',' + (isMulti ? "true" : "false") + ')"';

        var toolsHtml = (j.tools && j.tools.length) ? esc(j.tools.join(", ")) : "—";
        var domainLabel = isMulti ? ("Batch " + esc(batchId || "—")) : esc(j.domain || "—");

        var html = "";
        html += '<div class="job-row" id="row-' + esc(key) + '">';
        html += '<div class="job-main">';

        html += '<div class="job-content">';
        html += '<div class="job-domain">';
        html += '<span class="type-badge ' + (isMulti ? "type-multi" : "type-single") + '">' + (isMulti ? "multi" : "single") + "</span>";
        html += '<span class="domain-text">' + domainLabel + "</span>";
        html += '<span class="status-badge status-idle" id="status-' + esc(key) + '">Waiting...</span>';
        html += '<span class="job-row-spacer">&nbsp;</span>';
        html += '<span class="job-meta-inline">';
        html += '<span id="elapsed-' + esc(key) + '" data-started="' + esc(j.startedAt || "") + '">Started: ' + esc(elapsed(j.startedAt)) + '</span>';
        html += '<span>&nbsp;&nbsp;ID: <code>' + esc((isMulti ? batchId : jobId) || "—") + '</code></span>';
        html += '</span>';
        html += "</div>";

        var domainsForDisplay = domainListForJob(j);
        var statusByDomain = domainStatusMap(j.domain_statuses || []);
        var statusItemByDomain = domainStatusItemMap(j.domain_statuses || []);
        if (isMulti && domainsForDisplay && domainsForDisplay.length) {
          html += '<div class="domain-rows" id="domain-rows-' + esc(key) + '">';
          html += '<table class="domain-table" cellspacing="0" cellpadding="0">';
          html += '<colgroup><col class="domain-col-domain"><col class="domain-col-time"><col class="domain-col-status"></colgroup>';
          html += '<thead><tr><th>Domain</th><th>Process time</th><th>Status</th></tr></thead>';
          html += '<tbody>';
          for (var i = 0; i < domainsForDisplay.length; i++) {
            var domainName = domainsForDisplay[i];
            var initialStatus = normalizeDomainStatus(statusByDomain[domainName] || "queued");
            var initialStatusItem = statusItemByDomain[domainName] || null;
            var rowClass = initialStatus === "done" ? " is-done" : initialStatus === "failed" ? " is-failed" : initialStatus === "scanning" ? " is-running" : "";
            var dotColor = initialStatus === "done" ? "#28a745" : initialStatus === "failed" ? "#dc3545" : initialStatus === "scanning" ? "#185fa5" : "#ccc";
            var timeKey = processTimeKey(key, domainName);
            var initialApiMs = numericProcessMs(initialStatusItem);
            var initialApiText = textProcessTime(initialStatusItem);
            var initialTimeText = initialApiMs !== null ? formatDurationMs(initialApiMs) : (initialApiText || "—");
            html += '<tr class="domain-row-item' + rowClass + '" id="drow-' + esc(key) + '-' + i + '" data-time-key="' + esc(timeKey) + '" data-domain="' + esc(domainName) + '">';
            html += '<td class="domain-name-cell"><span class="domain-dot" style="background:' + dotColor + ';"></span>';
            html += '<span class="domain-row-name" title="' + esc(domainName) + '">' + esc(domainName) + '</span></td>';
            html += '<td class="domain-row-time">' + esc(initialTimeText) + '</td>';
            html += '<td class="domain-row-status">' + esc(initialStatus || "queued") + '</td>';
            html += '</tr>';
          }
          html += '</tbody></table></div>';
        }

        html += '<div class="tools-line">Tools: ' + toolsHtml + "</div>";
        html += "</div>";

        html += '<div class="pb-wrap">';
        html += '<div class="pb-track"><div class="pb-fill" id="fill-' + esc(key) + '" style="width:0%"></div></div>';
        html += '<div class="pb-text" id="pt-' + esc(key) + '">—</div>';
        html += "</div>";

        // html += '<div class="job-actions">';
        // html += '<a class="view-link" href="' + esc(viewUrl) + '" target="_blank">View →</a>';
        // html += '<button class="btn" style="height:24px;padding:0 8px;font-size:10px;" ' + logAttr + '>Log</button>';
        // html += '<button class="btn btn-red" style="height:24px;padding:0 8px;font-size:10px;" ' + stopAttr + '>Stop</button>';
        // html += "</div>";

        html += "</div>";

        html += '<div class="log-row" id="logrow-' + esc(key) + '">';
        html += '<div class="log-box" id="logbox-' + esc(key) + '">(click Log to load)</div>';
        html += "</div>";

        html += "</div>";

        return html;
      }

      // ── Done detection & animated row removal ────────────────────────────
      var DONE_SHOW_MS = 3500; // show green "Done" for this long before fading

      function markJobDone(key, j) {
        if (doneKeys[key]) return;

        var finalCounts = getDomainScanCounts(j);
        rememberDomainScanCounts(key, finalCounts.total || 1, finalCounts.total || 1);
        updateStats();

        doneKeys[key] = true;

        var fill  = byId("fill-"   + key);
        var badge = byId("status-" + key);
        var pt    = byId("pt-"     + key);
        var row   = byId("row-"    + key);

        if (fill)  { fill.classList.remove("indeterminate"); fill.className = "pb-fill done"; fill.style.width = "100%"; }
        if (badge) { badge.textContent = "Done ✓"; badge.className = "status-badge status-done"; }
        if (pt)    { pt.textContent = "Completed"; }

        var metaDiv = byId("elapsed-" + key);
        if (metaDiv) metaDiv.style.color = "#28a745";

        setTimeout(function() {
          if (!row) {
            if (getVisibleJobRowCount() === 0) renderNoScanningState();
            return;
          }

          row.style.transition = "opacity 1s ease, max-height 0.8s ease";
          row.style.opacity = "0";
          row.style.overflow = "hidden";

          setTimeout(function() {
            if (row.parentNode) row.parentNode.removeChild(row);
            allJobs = allJobs.filter(function(jb) { return jobKey(jb) !== key; });
            delete domainScanByKey[key];
            deleteDomainProcessTimesForJob(key);
            updateStats();

            if (getVisibleJobRowCount() === 0) {
              renderNoScanningState();
            }
          }, 1000);
        }, DONE_SHOW_MS);
      }

      function fetchProgress(j) {
        var key = jobKey(j);
        if (doneKeys[key]) return; // already done, skip

        var isMulti = j.type === "multi";
        var url = isMulti
          ? j._serverBase + "/multi-progress?batch_id=" + encodeURIComponent(j.batchId || "")
          : j._serverBase + "/progress?job_id=" + encodeURIComponent(j.jobId || "");

        xhrGetJson(url, function(data) {
          if (doneKeys[key]) return; // may have resolved while XHR was in flight

          var p = data.progress || {};
          var completed = parseInt(p.completed || "0", 10);
          var total = parseInt(p.total || "0", 10);
          var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
          var status = p.status || "";
          var isDone = status.toUpperCase().indexOf("DONE") === 0;
          var statusUpper = String(status || "").toUpperCase();
          var isChecking =
            statusUpper.indexOf("CHECKING") >= 0 ||
            statusUpper.indexOf("STARTING") >= 0 ||
            statusUpper.indexOf("QUEUED") >= 0;

          if (!isMulti) {
            rememberDomainScanCounts(key, isDone ? 1 : 0, 1);
            updateStats();
          }

          var fill = byId("fill-" + key);
          var pt = byId("pt-" + key);
          var badge = byId("status-" + key);

          if (fill) {
            fill.className = isDone ? "pb-fill done" : "pb-fill";

            if (!isDone && isChecking && completed === 0) {
              fill.classList.add("indeterminate");
              fill.style.width = "";
            } else if (!isDone && pct === 0) {
              fill.style.width = "6%";
            } else {
              fill.style.width = pct + "%";
            }
          }

          if (pt) {
            pt.innerHTML = completed + "/" + total + " — " + esc(status || "…");
          }

          if (badge) {
            badge.innerHTML = esc(status || "Running");
            badge.className = "status-badge " + (isDone ? "status-done" : "status-running");
          }

          if (isMulti) {
            var domainsForDisplay = domainListForJob(j);
            if (data.domains && data.domains.length) domainsForDisplay = data.domains;

            var statusByDomain = domainStatusMap(data.domain_statuses || []);
            var statusItemByDomain = domainStatusItemMap(data.domain_statuses || []);
            var completedDomains = data.completed_domains || [];
            var failedDomains = data.failed_domains || [];
            var currentDomain = p.current_domain || "";

            var scannedTotal = domainsForDisplay && domainsForDisplay.length ? domainsForDisplay.length : total;
            var scannedDone = typeof data.done_count !== "undefined" ? data.done_count : completedDomains.length;
            rememberDomainScanCounts(key, scannedDone, scannedTotal);
            updateStats();

            for (var di = 0; di < domainsForDisplay.length; di++) {
              var d = domainsForDisplay[di];
              var statusLabel = statusByDomain[d] || "queued";
              var statusItem = statusItemByDomain[d] || null;

              if (!statusByDomain[d]) {
                var isDomDone = completedDomains.indexOf(d) >= 0;
                var isDomFail = failedDomains.indexOf(d) >= 0;
                var isDomRun  = !isDomDone && !isDomFail && d === currentDomain && !isDone;
                statusLabel = isDomDone ? "done" : isDomFail ? "failed" : isDomRun ? "scanning" : "queued";
                statusItem = { domain: d, status: statusLabel };
              }

              applyDomainStatusToRow(byId("drow-" + key + "-" + di), statusLabel, statusItem);
            }
          }

          if (openLogs[key]) {
            fetchLog(key, isMulti ? (j.batchId || "") : (j.jobId || ""), j._serverBase, isMulti);
          }

          // ── Reliable done detection via dedicated endpoints ───────────────
          if (isDone) {
            markJobDone(key, j);
            return;
          }

          if (!isMulti) {
            // For single jobs: confirm done via /done flag file (most reliable)
            var doneUrl = j._serverBase + "/done?job_id=" + encodeURIComponent(j.jobId || "");
            xhrGetJson(doneUrl, function(doneData) {
              if (doneData && (doneData.done === true || doneData.done === "true" || doneData.done === 1)) {
                markJobDone(key, j);
              }
            });
          } else {
            // For multi jobs: confirm done via /multi-status (running: false)
            var msUrl = j._serverBase + "/multi-status?batch_id=" + encodeURIComponent(j.batchId || "");
            xhrGetJson(msUrl, function(msData) {
              if (msData && msData.running === false) {
                markJobDone(key, j);
              }
            });
          }
        });
      }

      window.toggleLog = function(key, id, serverBase, isMulti) {
        var row = byId("logrow-" + key);
        if (!row) return;

        if (openLogs[key]) {
          openLogs[key] = false;
          row.style.display = "none";
        } else {
          openLogs[key] = true;
          row.style.display = "block";
          fetchLog(key, id, serverBase, isMulti);
        }
      };

      function fetchLog(key, id, serverBase, isMulti) {
        var url = isMulti
          ? serverBase + "/multi-log?batch_id=" + encodeURIComponent(id)
          : serverBase + "/log?job_id=" + encodeURIComponent(id);

        xhrGetText(url, function(text) {
          var box = byId("logbox-" + key);
          if (!box) return;
          var lines = text.split("\n");
          if (lines.length > 60) lines = lines.slice(lines.length - 60);
          box.textContent = lines.join("\n") || "(no output yet)";
          box.scrollTop = box.scrollHeight;
        });
      }

      window.stopJob = function(type, key, idOrDomain, serverBase) {
        if (!confirm("Stop this job?\n\n" + idOrDomain)) return;

        var url = serverBase + (type === "multi" ? "/stop-multi" : "/stop");
        var body = type === "multi" ? { batch_id: idOrDomain } : { domain: idOrDomain };

        xhrPost(url, body, function(data) {
          if (data && data.ok) {
            setTimeout(function() { refreshAll(); }, 1200);
          } else {
            alert("Failed to stop job: " + (data && data.error ? data.error : "Unknown error"));
          }
        });
      };

      window.refreshAll = function() {
        fetchAllServers();
      };

      function startAutoRefresh() {
        setAutoRefreshRate(IDLE_REFRESH_MS, "Idle");
      }

      function fixSpaces(str) {
        return String(str).replace(/%20/g, ' ');
      }

      // Live elapsed time ticker — updates every second for running jobs
      function tickElapsed() {
        var elems = document.querySelectorAll("[id^='elapsed-']");
        for (var i = 0; i < elems.length; i++) {
          var el = elems[i];
          var key = el.id.replace("elapsed-", "");
          if (doneKeys[key]) continue; // frozen — job is done
          var started = el.getAttribute("data-started");
          if (started) el.textContent = "Started: " + elapsed(started);
        }

        var runningDomainRows = document.querySelectorAll(".domain-row-item.is-running");
        for (var r = 0; r < runningDomainRows.length; r++) {
          updateDomainProcessTime(runningDomainRows[r], "scanning", null);
        }
      }

      window.onload = function() {
        renderServerPills();
        fetchAllServers();
        startAutoRefresh();
        setInterval(tickElapsed, 1000);
      };
    })();
    </script>
  </body>
</html>
